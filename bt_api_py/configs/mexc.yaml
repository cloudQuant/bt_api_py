# MEXC 交易所统一配置
# 数据来源: bt_api_py/containers/exchanges/mexc_exchange_data.py
id: mexc
display_name: MEXC
venue_type: cex
website: https://www.mexc.com
api_doc: https://mexcdevelop.github.io/apidocs

base_urls:
  rest:
    swap: https://api.mexc.com
    spot: https://api.mexc.com
    margin: https://api.mexc.com
  wss:
    swap: wss://wbs.mexc.com/ws
    spot: wss://wbs.mexc.com/ws
    margin: wss://wbs.mexc.com/ws

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha256
  header_name: X-MEXC-APIKEY
  timestamp_key: X-MEXC-TIMESTAMP
  signature_key: X-MEXC-SIGNATURE

# 共享默认 kline 周期映射
kline_periods:
  1m: "1m"
  3m: "3m"
  5m: "5m"
  15m: "15m"
  30m: "30m"
  1h: "1h"
  2h: "2h"
  4h: "4h"
  6h: "6h"
  12h: "12h"
  1d: "1d"
  1w: "1w"
  1M: "1M"

# 共享默认法币列表
legal_currency: [USDT, USD, BTC, ETH, USDC]

rate_limits:
  - name: request_weight
    type: sliding_window
    interval: 60
    limit: 2400
    scope: global
    weight: 1
    weight_map:
      "/api/v1/depth": 5
      "/api/v1/klines": 5
      "/api/v1/exchangeInfo": 40
      "/api/v1/account": 5
      "/api/v1/balance": 5
      "/api/v1/positionRisk": 5
  - name: order_rate
    type: sliding_window
    interval: 10
    limit: 300
    scope: endpoint
    endpoint: "/api/v1/order*"
    weight: 1
  - name: order_rate_minute
    type: sliding_window
    interval: 60
    limit: 1200
    scope: endpoint
    endpoint: "/api/v1/order*"
    weight: 1

# ═══════════════════════════════════════════════════════════════
# Asset Types — 每个子类型对应 MEXCExchangeData 的一个子类
