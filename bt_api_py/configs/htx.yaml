      kline: "{symbol}.kline.{period}"
      mini_ticker: "{symbol}.detail"
      ticker: "{symbol}.ticker"
      book_ticker: "{symbol}.bbo"
      depth: "{symbol}.depth.{type}"
      increDepthFlow: "{symbol}.depth.{type}"
      mark_price: "{symbol}.mark_price.{period}"
      funding_rate: "{symbol}.funding_rate"
      force_order: "{symbol}.liquidation_orders"
      orders: "orders"
      deals: "matches"
      balance: "accounts"
      position: "positions"
      account: "accounts"

