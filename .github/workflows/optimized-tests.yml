# Extended CI — benchmarks, build validation, security deep scan, coverage analysis.
# Primary quality gate (lint, type check, tests, coverage enforcement) lives in tests.yml.
# This workflow only runs on schedule and push to main to avoid duplicate CI runs.
name: Extended CI

on:
  push:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Performance benchmarks
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run performance tests
      run: |
        pytest tests/performance/ --tb=short -v --benchmark-json=benchmark.json || true
      continue-on-error: true

    - name: Store benchmark result
      if: success()
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        comment-on-alert: true
        alert-threshold: '200%'
        fail-on-alert: false

  # Security deep scan (bandit + safety/pip-audit)
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install bandit pip-audit

    - name: Run security scan
      run: |
        bandit -r bt_api_py/ -f json -o bandit-report.json || true
        pip-audit --output=json > pip-audit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json

  # Test coverage trend analysis (schedule only)
  coverage-analysis:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run coverage analysis
      run: |
        python scripts/analyze_coverage.py

    - name: Create coverage issue if needed
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const report = fs.readFileSync('coverage_analysis.md', 'utf8');

            // Check for critical issues
            if (report.includes('Untested exchanges:')) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Test Coverage Analysis Report',
                body: report,
                labels: ['testing', 'coverage']
              });
            }
          } catch (e) {
            console.log('Could not run coverage analysis:', e);
          }

  # Build and package tests
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        twine check dist/*

    - name: Test installation
      run: |
        pip install dist/*.whl
        python -c "import bt_api_py; print('Package installed successfully')"

  # Notify on failures
  notify:
    if: failure()
    needs: [performance, security, build-test]
    runs-on: ubuntu-latest

    steps:
    - name: Notify on failure
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const sha = context.sha;

          // Get failed jobs
          const runs = await github.rest.actions.listJobsForWorkflowRun({
            owner,
            repo,
            run_id: context.runId,
          });

          const failedJobs = runs.data.jobs.filter(job => job.conclusion === 'failure');
          const jobNames = failedJobs.map(job => job.name).join(', ');

          // Create issue or comment
          if (context.event_name === 'pull_request') {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body: `❌ **Test Failed**: ${jobNames}\n\nPlease check the [workflow run](https://github.com/${owner}/${repo}/actions/runs/${context.runId}) for details.`
            });
          } else {
            await github.rest.issues.create({
              owner,
              repo,
              title: `Test Suite Failed - ${sha.substring(0, 7)}`,
              body: `**Failed Jobs**: ${jobNames}\n\n[Workflow Run](https://github.com/${owner}/${repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'ci-failure']
            });
          }
