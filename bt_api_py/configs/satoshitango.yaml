# SatoshiTango Exchange Configuration
id: satoshitango
display_name: SatoshiTango
venue_type: cex
website: https://www.satoshitango.com
api_doc: https://api.satoshitango.com

base_urls:
  rest:
    default: https://api.satoshitango.com
    spot: https://api.satoshitango.com
  wss:
    default: ""
    spot: ""

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: api_key
  header_name: X-API-Key

kline_periods:
  1m: "1"
  5m: "5"
  15m: "15"
  30m: "30"
  1h: "60"
  4h: "240"
  1d: "1d"
  1w: "1w"

legal_currency: [ARS, USD, BTC, ETH, USDT]

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 60
    scope: global
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 30
    scope: global

asset_types:
  spot:
    exchange_name: satoshitango
    symbol_format: "{base}/{quote}"
    legal_currency: [ARS, USD, BTC, ETH, USDT]
    rest_paths:
      get_server_time: "GET /v1/time"
      get_tick: "GET /v1/ticker"
      get_depth: "GET /v1/orderbook"
      get_kline: "GET /v1/klines"
      get_exchange_info: "GET /v1/symbols"
      get_trades: "GET /v1/trades"
    wss_paths:
      ticker: ""
      depth: ""
      kline: ""
