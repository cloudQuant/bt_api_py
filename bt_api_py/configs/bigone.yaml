# BigONE Exchange Configuration
# BigONE API v3 with JWT (HS256) authentication
id: bigone
display_name: BigONE
venue_type: cex
website: https://big.one
api_doc: https://open.big.one/docs/api.html

authentication:
  type: jwt_hs256

kline_periods:
  1m: min1
  5m: min5
  15m: min15
  30m: min30
  1h: hour1
  4h: hour4
  12h: hour12
  1d: day1
  1w: week1
  1M: month1

legal_currency: [USDT, USD, BTC, ETH, EUR]

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 10
    limit: 500
    scope: global
  - name: private_api
    type: sliding_window
    interval: 10
    limit: 500
    scope: global

asset_types:
  spot:
    exchange_name: BIGONE___SPOT
    rest_url: "https://big.one/api/v3"
    wss_url: "wss://big.one/ws/v2"
    symbol_format: "{base}-{quote}"
    legal_currency: [USDT, USD, BTC, ETH, EUR]
    rest_paths:
      # Public endpoints
      get_server_time: "GET /ping"
      get_exchange_info: "GET /asset_pairs"
      get_tick: "GET /asset_pairs/{symbol}/ticker"
      get_tick_all: "GET /asset_pairs/tickers"
      get_depth: "GET /asset_pairs/{symbol}/depth"
      get_trades: "GET /asset_pairs/{symbol}/trades"
      get_kline: "GET /asset_pairs/{symbol}/candles"
      # Trading endpoints (require JWT auth)
      make_order: "POST /viewer/orders"
      cancel_order: "POST /viewer/orders/{order_id}/cancel"
      cancel_all_orders: "POST /viewer/orders/cancel"
      get_open_orders: "GET /viewer/orders"
      query_order: "GET /viewer/orders/{order_id}"
      get_deals: "GET /viewer/trades"
      # Account endpoints (require JWT auth)
      get_balance: "GET /viewer/accounts"
      get_account: "GET /viewer/accounts"
    wss_paths:
      ticker: "ticker"
      depth: "depth"
      trade: "trade"
