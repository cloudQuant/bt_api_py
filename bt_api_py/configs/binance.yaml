# Binance 交易所统一配置
# 数据来源: bt_api_py/containers/exchanges/binance_exchange_data.py
id: binance
display_name: Binance
venue_type: cex
website: https://www.binance.com
api_doc: https://binance-docs.github.io/apidocs

base_urls:
  rest:
    swap: https://fapi.binance.com
    spot: https://api.binance.com
    coin_m: https://dapi.binance.com
    option: https://eapi.binance.com
    margin: https://api.binance.com
    algo: https://api.binance.com
    wallet: https://api.binance.com
    sub_account: https://api.binance.com
    portfolio: https://api.binance.com
    grid: https://api.binance.com
    staking: https://api.binance.com
    mining: https://api.binance.com
    vip_loan: https://api.binance.com
  wss:
    swap: wss://fstream.binance.com/ws
    spot: wss://stream.binance.com/ws
    coin_m: wss://dstream.binance.com/ws
    option: wss://nbstream.binance.com/eoptions/ws
    margin: wss://stream.binance.com/ws
    algo: wss://stream.binance.com/ws
    wallet: wss://stream.binance.com/ws
    sub_account: wss://stream.binance.com/ws
    portfolio: wss://stream.binance.com/ws
    grid: wss://stream.binance.com/ws
    staking: wss://stream.binance.com/ws
    mining: wss://stream.binance.com/ws
    vip_loan: wss://stream.binance.com/ws
  acct_wss:
    swap: wss://fstream.binance.com/ws
    spot: "wss://ws-api.binance.com:443/ws-api/v3"
    coin_m: wss://dstream.binance.com/ws
    option: wss://nbstream.binance.com/eoptions/ws
    margin: wss://stream.binance.com/ws

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha256
  header_name: X-MBX-APIKEY
  timestamp_key: timestamp
  signature_key: signature

# 共享默认 kline 周期映射
kline_periods:
  1s: "1s"
  1m: "1m"
  3m: "3m"
  5m: "5m"
  15m: "15m"
  30m: "30m"
  1h: "1h"
  2h: "2h"
  4h: "4h"
  6h: "6h"
  8h: "8h"
  12h: "12h"
  1d: "1d"
  3d: "3d"
  1w: "1w"
  1M: "1M"

# 共享默认法币列表
legal_currency: [USDT, USD, BTC, ETH]

rate_limits:
  - name: request_weight
    type: sliding_window
    interval: 60
    limit: 2400
    scope: global
    weight: 1
    weight_map:
      "/fapi/v1/depth": 5
      "/fapi/v1/klines": 5
      "/fapi/v1/exchangeInfo": 40
      "/fapi/v2/account": 5
      "/fapi/v2/balance": 5
      "/fapi/v2/positionRisk": 5
  - name: order_rate
    type: sliding_window
    interval: 10
    limit: 300
    scope: endpoint
    endpoint: "/fapi/v1/order*"
    weight: 1
  - name: order_rate_minute
    type: sliding_window
    interval: 60
    limit: 1200
    scope: endpoint
    endpoint: "/fapi/v1/order*"
    weight: 1

# ═══════════════════════════════════════════════════════════════
# Asset Types — 每个子类型对应 BinanceExchangeData 的一个子类
