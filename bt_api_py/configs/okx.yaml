# OKX 交易所统一配置
# 数据来源: bt_api_py/containers/exchanges/okx_exchange_data.py
id: okx
display_name: OKX
venue_type: cex
website: https://www.okx.com
api_doc: https://www.okx.com/docs-v5/en/

base_urls:
  rest:
    default: https://www.okx.com
  wss:
    public: wss://ws.okx.com:8443/ws/v5/public
    private: wss://ws.okx.com:8443/ws/v5/private
    business: wss://ws.okx.com:8443/ws/v5/business
  acct_wss:
    default: wss://ws.okx.com:8443/ws/v5/private

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha256
  header_name: OK-ACCESS-KEY
  timestamp_key: OK-ACCESS-TIMESTAMP
  signature_key: OK-ACCESS-SIGN

# 共享 kline 周期映射
kline_periods:
  1m: "1m"
  3m: "3m"
  5m: "5m"
  15m: "15m"
  30m: "30m"
  1h: "1H"
  2h: "2H"
  4h: "4H"
  6h: "6H"
  12h: "12H"
  1d: "1D"
  1w: "1W"
  1M: "1M"
  3M: "3M"

# 订单状态映射
status_dict:
  live: submit
  partially_filled: partial-filled
  filled: filled
  canceled: cancel
  mmp_canceled: cancel

rate_limits:
  - name: general
    type: sliding_window
    interval: 2
    limit: 20
    scope: endpoint
    endpoint: "/api/v5/market/*"
    weight: 1
  - name: trade
    type: sliding_window
    interval: 2
    limit: 60
    scope: endpoint
    endpoint: "/api/v5/trade/order"
    weight: 1
  - name: account
    type: sliding_window
    interval: 2
    limit: 10
    scope: endpoint
    endpoint: "/api/v5/account/*"
    weight: 1

