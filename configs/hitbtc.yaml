# HitBTC Configuration
#
# HitBTC API configuration for bt_api_py framework
# For more information: https://api.hitbtc.com/

# Basic settings
exchange_name: "HitBTC"
rest_url: "https://api.hitbtc.com/api/3"
ws_url: "wss://api.hitbtc.com/api/3/ws/public"
ws_trading_url: "wss://api.hitbtc.com/api/3/ws/trading"
ws_wallet_url: "wss://api.hitbtc.com/api/3/ws/wallet"
timeout: 10

# Rate limits configuration
rate_limits:
  market_data:
    calls: 100
    seconds: 1
  trading:
    calls: 300
    seconds: 1
  wallet:
    calls: 10
    seconds: 1

# Supported symbols (will be populated automatically)
symbols: {}

# Trading settings
spot:
  default_time_in_force: "GTC"
  max_order_size: 1000000  # Max order size in quote currency
  min_order_size: 0.0001   # Min order size in base currency
  price_precision: 8       # Price decimal places
  quantity_precision: 8    # Quantity decimal places

# Fee settings (example values, actual fees may vary)
fees:
  maker: -0.0001   # -0.01% (negative maker fees)
  taker: 0.0007   # 0.07%
  usd_taker: 0.0025  # 0.25% for USD pairs

# API settings
api:
  # Demo/Sandbox API endpoints (for testing)
  demo_rest_url: "https://api.demo.hitbtc.com/api/3"
  demo_ws_url: "wss://api.demo.hitbtc.com/api/3/ws/public"
  demo_ws_trading_url: "wss://api.demo.hitbtc.com/api/3/ws/trading"

# WebSocket settings
websocket:
  ping_interval: 30
  reconnect_delay: 5
  max_reconnect_attempts: 10
  heartbeat_interval: 20

# Logging settings
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: "logs/hitbtc.log"

# Data persistence
persistence:
  save_trades: true
  save_orders: true
  save_balances: true
  cache_symbols: true
  cache_duration: 3600  # Cache duration in seconds

# Security settings
security:
  # Rate limiting
  enable_rate_limit: true
  rate_limit_buffer: 0.8  # Use 80% of rate limit

  # Timeout settings
  connect_timeout: 10
  read_timeout: 30
  request_timeout: 60

  # Retry settings
  max_retries: 3
  retry_delay: 1