# Coinone Exchange Configuration
# API: Public V2 / Private V2.1  (https://docs.coinone.co.kr)
# Auth: HMAC-SHA512 over Base64 payload, secret uppercased
# Response: {"result": "success", "errorCode": "0", ...}
# Symbol: KRW-BTC  (quote-target, dash separated)
id: coinone
display_name: Coinone
venue_type: cex
website: https://coinone.co.kr
api_doc: https://docs.coinone.co.kr

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha512
  header_name: X-COINONE-SIGNATURE
  payload_header: X-COINONE-PAYLOAD

kline_periods:
  1m: 1m
  5m: 5m
  15m: 15m
  30m: 30m
  1h: 1h
  4h: 4h
  1d: 1d
  1w: 1w

legal_currency: &lc
  - KRW

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 1200
    scope: global
  - name: private_api
    type: sliding_window
    interval: 1
    limit: 80
    scope: global

asset_types:
  spot:
    exchange_name: COINONE___SPOT
    rest_url: "https://api.coinone.co.kr"
    wss_url: "wss://stream.coinone.co.kr"
    symbol_format: "{quote}-{base}"
    legal_currency: *lc
    rest_paths:
      # Market Data (public GET, paths have {quote}/{target} placeholders)
      get_exchange_info: "GET /public/v2/markets/KRW"
      get_tick: "GET /public/v2/ticker_new/KRW"
      get_depth: "GET /public/v2/orderbook/KRW"
      get_kline: "GET /public/v2/chart/KRW"
      get_trades: "GET /public/v2/trades/KRW"
      # Account (private POST V2.1)
      get_account: "POST /v2.1/account/balance/all"
      get_balance: "POST /v2.1/account/balance/all"
      # Trading (private POST V2.1)
      make_order: "POST /v2.1/order/limit"
      cancel_order: "POST /v2.1/order/cancel"
      query_order: "POST /v2.1/order/info"
      get_open_orders: "POST /v2.1/order/open_orders"
      get_deals: "POST /v2.1/order/complete_orders"
    kline_periods:
      1m: 1m
      5m: 5m
      15m: 15m
      30m: 30m
      1h: 1h
      4h: 4h
      1d: 1d
      1w: 1w
