id: bitunix
display_name: Bitunix
venue_type: cex
website: https://www.bitunix.com
api_doc: https://api-doc.bitunix.com/en_us/
connection:
  type: http
  timeout: 10
  max_retries: 3
base_urls:
  rest:
    default: https://fapi.bitunix.com
    spot: https://fapi.bitunix.com
  wss:
    default: wss://fapi.bitunix.com/public
    spot: wss://fapi.bitunix.com/public
authentication:
  type: hmac_sha256
  header_name: api-key
kline_periods:
  1m: 1m
  5m: 5m
  15m: 15m
  30m: 30m
  1h: 1h
  4h: 4h
  1d: 1d
  1w: 1w
legal_currency: &id001
- USDT
- USD
rate_limits:
- name: public_api
  type: sliding_window
  interval: 60
  limit: 1200
  scope: global
- name: private_api
  type: sliding_window
  interval: 60
  limit: 600
  scope: global
asset_types:
  spot:
    exchange_name: bitunixSpot
    symbol_format: '{base}{quote}'
    rest_paths:
      get_server_time: GET /api/v1/futures/market/time
      get_ticker: GET /api/v1/futures/market/tickers
      get_depth: GET /api/v1/futures/market/depth
      get_kline: GET /api/v1/futures/market/klines
      get_markets: GET /api/v1/futures/market/trading-pairs
    wss_paths:
      ticker: ticker
      depth: depth
      trade: trade
    legal_currency: *id001
