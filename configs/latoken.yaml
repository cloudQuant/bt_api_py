# Latoken Exchange Configuration
# API doc: https://api.latoken.com
# Auth: HMAC-SHA512 (X-LA-APIKEY / X-LA-SIGNATURE / X-LA-DIGEST)
# Symbol: UUID-based internally; user-facing {base}_{quote} lowercase
id: latoken
display_name: Latoken
venue_type: cex
website: https://latoken.com
api_doc: https://api.latoken.com

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha512
  header_name: X-LA-APIKEY
  signature_header: X-LA-SIGNATURE
  digest_header: X-LA-DIGEST

kline_periods:
  1m: "1"
  5m: "5"
  15m: "15"
  30m: "30"
  1h: "60"
  4h: "240"
  1d: "1D"
  1w: "1W"

legal_currency: &lc
  - USDT
  - BTC
  - ETH
  - LA

rate_limits:
  - name: rest_api
    type: fixed_window
    interval: 1
    limit: 1
    scope: global

asset_types:
  spot:
    exchange_name: LATOKEN___SPOT
    rest_url: "https://api.latoken.com"
    wss_url: ""
    symbol_format: "{base}_{quote}"
    legal_currency: *lc
    rest_paths:
      # Public (GET, no auth)
      get_server_time: "GET /v2/time"
      get_tick: "GET /v2/ticker/{base}/{quote}"
      get_all_tickers: "GET /v2/ticker"
      get_depth: "GET /v2/book/{currency}/{quote}"
      get_deals: "GET /v2/trade/history/{currency}/{quote}"
      get_exchange_info: "GET /v2/pair"
      get_currencies: "GET /v2/currency"
      get_kline: "GET /v2/chart/week/{currency}/{quote}"
      # Private (POST/GET, auth required)
      make_order: "POST /v2/auth/order/place"
      cancel_order: "POST /v2/auth/order/cancel"
      get_open_orders: "GET /v2/auth/order/pair/{currency}/{quote}/active"
      get_balance: "GET /v2/auth/account"
      get_account: "GET /v2/auth/account"
    kline_periods:
      1m: "1"
      5m: "5"
      15m: "15"
      30m: "30"
      1h: "60"
      4h: "240"
      1d: "1D"
      1w: "1W"
