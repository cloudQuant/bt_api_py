      get_order: "GET /api/v2/spot/trade/orderInfo"
      get_open_orders: "GET /api/v2/spot/trade/unfilled-orders"
      get_all_orders: "GET /api/v2/spot/trade/history-orders"
      get_deals: "GET /api/v2/spot/trade/fills"
