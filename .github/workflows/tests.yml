name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install build tools (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Install package + dev deps
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Unit tests
      run: pytest tests -v -m "unit" --cov=bt_api_py --cov-report=xml

    - name: Integration tests (best-effort)
      run: pytest tests -v -m "not unit" --cov=bt_api_py --cov-append --cov-report=xml || true
      continue-on-error: true
      env:
        SKIP_LIVE_TESTS: "true"

    - name: Upload coverage
      if: always()
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: ${{ matrix.os }}-py${{ matrix.python-version }}
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install linters
      run: pip install ruff mypy

    - name: Ruff
      run: ruff check bt_api_py --output-format=github

    - name: MyPy
      run: mypy bt_api_py --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install tools
      run: pip install bandit pip-audit

    - name: Bandit
      run: bandit -r bt_api_py -ll

    - name: Dependency audit
      run: pip-audit
      continue-on-error: true
