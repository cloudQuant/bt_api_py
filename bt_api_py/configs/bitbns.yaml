id: bitbns
display_name: Bitbns
venue_type: cex
website: https://bitbns.com
api_doc: https://github.com/bitbns-official/bitbnspy
base_urls:
  rest:
    default: https://api.bitbns.com
    spot: https://api.bitbns.com
  rest_public: https://api.bitbns.com/api/trade/v1
  wss:
    default: wss://ws.bitbns.com
    spot: wss://ws.bitbns.com
authentication:
  type: api_key
  header_name: X-API-KEY
kline_periods:
  1m: 1m
  5m: 5m
  15m: 15m
  30m: 30m
  1h: 1h
  2h: 2h
  4h: 4h
  6h: 6h
  12h: 12h
  1d: 1d
  1w: 1w
legal_currency: &id001
- INR
- USDT
rate_limits:
- name: public_api
  type: sliding_window
  interval: 60
  limit: 120
  scope: global
- name: private_api
  type: sliding_window
  interval: 60
  limit: 60
  scope: global
connection:
  type: http
  timeout: 10
  max_retries: 3
asset_types:
  spot:
    exchange_name: bitbns
    symbol_format: '{base}'
    rest_paths:
      get_server_time: GET /currentTime
      get_ticker: GET /ticker
      get_depth: GET /orderBook
      get_kline: GET /kline
      get_trades: GET /recentTrades
    wss_paths:
      ticker: ticker
      depth: orderBook
    legal_currency: *id001
