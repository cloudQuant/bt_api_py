# Bitstamp 交易所统一配置
# 数据来源: https://www.bitstamp.net/api/
id: bitstamp
display_name: Bitstamp
venue_type: cex
website: https://www.bitstamp.net
api_doc: https://www.bitstamp.net/api/

base_urls:
  rest:
    spot: https://www.bitstamp.net/api/v2
  wss:
    spot: wss://ws.bitstamp.net

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha256
  header_name: X-Auth
  header_format: "BITSTAMP {key}"
  extra_headers:
    X-Auth-Signature: signature
    X-Auth-Nonce: nonce
    X-Auth-Timestamp: timestamp
    X-Auth-Version: "v2"

# K线周期映射 - OHLC step (秒)
kline_periods:
  1m: "60"
  3m: "180"
  5m: "300"
  15m: "900"
  30m: "1800"
  1h: "3600"
  2h: "7200"
  4h: "14400"
  6h: "21600"
  12h: "43200"
  1d: "86400"
  3d: "259200"

legal_currency: [USD, EUR, GBP, USDC]

rate_limits:
  - name: request_weight
    type: sliding_window
    interval: 1
    limit: 400
    scope: ip
  - name: sliding_window
    type: sliding_window
    interval: 600
    limit: 10000
    scope: ip

asset_types:
  # ─── Spot Trading ────────────────────────────────────────
  spot:
    exchange_name: bitstampSpot
    symbol_format: "{base}{quote}"
    symbol_lower: true
    legal_currency: [USD, EUR, GBP, USDC]
    rest_paths:
      # General
      ping: "GET /ping"
      get_server_time: "GET /server_time_utc"
      get_contract: "GET /trading-pairs-info/"
      # Market Data
      get_tick: "GET /ticker"
      get_depth: "GET /order_book"
      get_kline: "GET /ohlc"
      get_new_price: "GET /transactions"
      # Account
      get_account: "POST /balance/"
      get_balance: "POST /balance/"
      # Trade
      make_order: "POST /buy"
      cancel_order: "POST /cancel_order"
      cancel_all: "POST /cancel_all_orders"
      query_order: "POST /order_status"
      get_open_orders: "POST /open_orders/all"
      get_deals: "POST /user_transactions"
    wss_paths:
      # Market Streams
      tick: "live_trades_<pair>"
      depth: "order_book_<pair>"
      diff_depth: "diff_order_book_<pair>"
      detail_depth: "detail_order_book_<pair>"
