# ──────────────────────────────────────────────────────────────
# LocalBitcoins – Feed-pattern configuration
# P2P cryptocurrency exchange, HMAC-SHA256 auth
# ──────────────────────────────────────────────────────────────

exchange_name: "LOCALBITCOINS___SPOT"
display_name: "LocalBitcoins"

# ── URLs ──────────────────────────────────────────────────────
rest_url: "https://localbitcoins.com"
wss_url: ""

# ── Symbol format ─────────────────────────────────────────────
symbol_format: "lowercase_underscore"      # btc_usd

# ── Authentication ────────────────────────────────────────────
auth_type: "hmac_sha256"
auth_header: "Apiauth"
# Signature: HMAC-SHA256( nonce + api_key + endpoint + query + body )

# ── Legal currencies ──────────────────────────────────────────
legal_currency:
  - USD
  - EUR
  - GBP
  - RUB
  - BTC

# ── REST paths ────────────────────────────────────────────────
rest_paths:
  get_server_time:    "GET /api/ecjson.php"
  get_tick:           "GET /bitcoinaverage/ticker-all-currencies/"
  get_all_tickers:    "GET /bitcoinaverage/ticker-all-currencies/"
  get_exchange_info:  "GET /api/currencies/"
  get_ads:            "GET /api/ad-get/{id}/"
  get_ads_search:     "GET /buy-bitcoins-online/{currency}/"
  get_online_ads:     "GET /buy-bitcoins-online/{currency}/{country_code}/"
  get_wallet:         "GET /api/wallet/"
  get_wallet_balance: "GET /api/wallet-balance/"
  get_account:        "GET /api/myself/"
  get_balance:        "GET /api/wallet-balance/"

# ── Kline periods (P2P – minimal support) ─────────────────────
kline_periods:
  1d: "1d"

# ── Rate limits ───────────────────────────────────────────────
rate_limits:
  - name: rest_api
    type: fixed_window
    interval: 60
    limit: 60
    scope: global
