# Interactive Brokers Web API 统一配置
# 数据来源: bt_api_py/containers/exchanges/ib_web_exchange_data.py
id: ib_web
display_name: Interactive Brokers Web API
venue_type: broker
website: https://www.interactivebrokers.com
api_doc: https://www.interactivebrokers.com/api/doc.html

base_urls:
  rest:
    production: https://api.interactivebrokers.com
    testing: https://api.test.interactivebrokers.com
    gateway: https://localhost:5000
    default: https://localhost:5000
  wss:
    default: wss://localhost:5000/v1/api/ws
  acct_wss:
    default: wss://localhost:5000/v1/api/ws

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: oauth
  header_name: Authorization

# K线周期映射
kline_periods:
  1m: "1min"
  5m: "5min"
  15m: "15min"
  30m: "30min"
  1h: "1h"
  2h: "2h"
  4h: "4h"
  1d: "1d"
  1w: "1w"
  1M: "1m"

# 订单状态映射
status_dict:
  submitted: submit
  filled: filled
  cancelled: cancel
  inactive: inactive
  presubmitted: presubmit

# 订单类型映射
order_type_map:
  market: MKT
  limit: LMT
  stop: STP
  stop_limit: STP_LMT

# 有效期映射
tif_map:
  day: DAY
  gtc: GTC
  ioc: IOC
  gtd: GTD

# 合约类型映射
sec_type_map:
  STK: Stock
  FUT: Future
  OPT: Option
  FOP: FutureOption
  CASH: Forex
  CFD: CFD
  BOND: Bond
  CRYPTO: Crypto

# 市场数据快照字段
market_data_fields:
  last_price: "31"
  bid_price: "84"
  bid_size: "85"
  ask_price: "86"
  ask_size: "88"
  volume: "7059"
  open: "7295"
  high: "70"
  low: "71"
  close: "7291"
  change: "82"
  change_pct: "83"

# 默认快照字段
default_snapshot_fields:
  - "31"
  - "84"
  - "85"
  - "86"
  - "88"
  - "7059"

rate_limits:
  - name: global_trading
    type: sliding_window
    interval: 1
    limit: 50
    scope: global
    weight: 1
  - name: cp_gateway
    type: sliding_window
    interval: 1
    limit: 10
    scope: global
    weight: 1
  - name: account_management
    type: sliding_window
    interval: 1
    limit: 10
    scope: endpoint
    endpoint: "/gw/api/v1/*"
    weight: 1
  - name: market_snapshot
    type: sliding_window
    interval: 1
    limit: 10
    scope: endpoint
    endpoint: "/iserver/marketdata/snapshot"
    weight: 1
  - name: orders_query
    type: sliding_window
    interval: 5
    limit: 1
    scope: endpoint
    endpoint: "/iserver/account/orders"
    weight: 1

# ═══════════════════════════════════════════════════════════════
# 共享 REST paths (YAML 锚点, 所有 asset_type 继承)
# ═══════════════════════════════════════════════════════════════
_shared_rest_paths: &shared_rest_paths
  # 会话管理
  auth_status: "POST /iserver/auth/status"
  reauthenticate: "POST /iserver/reauthenticate"
  oauth_token: "POST /oauth/token"
  # 合约搜索
  search_stocks: "GET /trsrv/stocks"
  search_futures: "GET /trsrv/futures"
  secdef_search: "GET /iserver/secdef/search"
  secdef_strikes: "GET /iserver/secdef/strikes"
  secdef_info: "GET /iserver/secdef/info"
  # 市场数据
  market_snapshot: "GET /iserver/marketdata/snapshot"
  market_history: "GET /iserver/marketdata/history"
  market_unsubscribe: "GET /iserver/marketdata/unsubscribe"
  get_tick: "GET /iserver/marketdata/snapshot"
  get_depth: "GET /iserver/marketdata/snapshot"
  get_kline: "GET /iserver/marketdata/history"
  # 订单管理
  make_order: "POST /iserver/account/{accountId}/orders"
  modify_order: "POST /iserver/account/{accountId}/order/{orderId}"
  cancel_order: "DELETE /iserver/account/{accountId}/order/{orderId}"
  get_open_orders: "GET /iserver/account/orders"
  order_reply: "POST /iserver/reply/{messageId}"
  suppress_messages: "POST /iserver/questions/suppress"
  suppress_reset: "POST /iserver/questions/suppress/reset"
  get_deals: "GET /iserver/trades"
  # 持仓和账户 (Trading API)
  portfolio_accounts: "GET /portfolio/accounts"
  portfolio_subaccounts: "GET /portfolio/subaccounts"
  get_position: "GET /portfolio/{accountId}/positions"
  get_account: "GET /portfolio/{accountId}/summary"
  get_balance: "GET /portfolio/{accountId}/ledger"
  # 账户管理 API (/gw/api/v1)
  get_accounts_list: "GET /gw/api/v1/accounts"
  get_account_detail: "GET /gw/api/v1/accounts/{accountId}"
  update_account: "PATCH /gw/api/v1/accounts/{accountId}"
  close_account: "POST /gw/api/v1/accounts/{accountId}/close"
  # 资金和银行
  bank_instructions: "GET /gw/api/v1/bank-instructions/query"
  withdraw_request: "POST /gw/api/v1/withdraw-request"
  deposit_request: "POST /gw/api/v1/deposit-request"
  internal_transfer: "POST /gw/api/v1/internal-transfer"
  # 报告
  statements: "GET /gw/api/v1/statements"
  tax_documents: "GET /gw/api/v1/tax-documents/available"
  trade_confirmations: "GET /gw/api/v1/trade-confirmations"
  # SSO
  sso_url: "GET /gw/api/v1/sso/url"
  # 通知
  fyi_unread: "GET /fyi/unreadnumber"
  fyi_notifications: "GET /fyi/notifications"
  fyi_settings: "GET /fyi/settings"

# ═══════════════════════════════════════════════════════════════
# Asset Types
# ═══════════════════════════════════════════════════════════════
asset_types:

  # ─── IB Web API 股票 (STK) ──────────────────────────────────
  stk:
    exchange_name: IB_WEB_STK
    symbol_format: "{symbol}"
    rest_paths:
      <<: *shared_rest_paths
    wss_paths:
      market_data: "smd+{conid}+{fields_json}"
      unsubscribe: "umd+{conid}+{}"
      account: "sacct"
      orders: "sor"
      pnl: "spl+{accountId}"
      trades: "str"
      heartbeat: "tic"

  # ─── IB Web API 期货 (FUT) ──────────────────────────────────
  fut:
    exchange_name: IB_WEB_FUT
    symbol_format: "{symbol}"
    rest_paths:
      <<: *shared_rest_paths
    wss_paths:
      market_data: "smd+{conid}+{fields_json}"
      unsubscribe: "umd+{conid}+{}"
      account: "sacct"
      orders: "sor"
      pnl: "spl+{accountId}"
      trades: "str"
      heartbeat: "tic"

  # ─── IB Web API 期权 (OPT) ──────────────────────────────────
  opt:
    exchange_name: IB_WEB_OPT
    symbol_format: "{symbol}"
    rest_paths:
      <<: *shared_rest_paths
    wss_paths:
      market_data: "smd+{conid}+{fields_json}"
      unsubscribe: "umd+{conid}+{}"
      account: "sacct"
      orders: "sor"
      pnl: "spl+{accountId}"
      trades: "str"
      heartbeat: "tic"

  # ─── IB Web API 外汇 (CASH) ─────────────────────────────────
  cash:
    exchange_name: IB_WEB_CASH
    symbol_format: "{base}.{quote}"
    rest_paths:
      <<: *shared_rest_paths
    wss_paths:
      market_data: "smd+{conid}+{fields_json}"
      unsubscribe: "umd+{conid}+{}"
      account: "sacct"
      orders: "sor"
      pnl: "spl+{accountId}"
      trades: "str"
      heartbeat: "tic"
