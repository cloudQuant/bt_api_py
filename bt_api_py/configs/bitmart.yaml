# BitMart Exchange Configuration
# BitMart API V2/V3 with HMAC SHA256 authentication
# Signature: timestamp + "#" + memo + "#" + body
id: bitmart
display_name: BitMart
venue_type: cex
website: https://www.bitmart.com
api_doc: https://developer.bitmart.com

authentication:
  type: hmac_sha256
  header_name: X-BM-KEY

kline_periods:
  1m: "1"
  3m: "3"
  5m: "5"
  15m: "15"
  30m: "30"
  45m: "45"
  1h: "60"
  2h: "120"
  3h: "180"
  4h: "240"
  1d: "1440"
  1w: "10080"
  1M: "43200"

legal_currency: [USDT, USD, BTC, ETH, USDC]

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 600
    scope: global
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 200
    scope: global

asset_types:
  spot:
    exchange_name: BITMART___SPOT
    rest_url: "https://api-cloud.bitmart.com"
    wss_url: "wss://ws-manager-compress.bitmart.com/api?protocol=1.1"
    symbol_format: "{base}_{quote}"
    legal_currency: [USDT, USD, BTC, ETH, USDC]
    rest_paths:
      # Public endpoints
      get_server_time: "GET /spot/v1/time"
      get_exchange_info: "GET /spot/v1/currencies"
      get_tick: "GET /spot/quotation/v3/ticker"
      get_tick_all: "GET /spot/quotation/v3/tickers"
      get_depth: "GET /spot/quotation/v3/books"
      get_trades: "GET /spot/quotation/v3/trades"
      get_kline: "GET /spot/quotation/v3/klines"
      # Trading endpoints (require HMAC auth)
      make_order: "POST /spot/v2/submit_order"
      cancel_order: "POST /spot/v3/cancel_order"
      cancel_all_orders: "POST /spot/v4/cancel_all"
      query_order: "POST /spot/v4/query/order"
      get_open_orders: "POST /spot/v4/query/open-orders"
      get_deals: "POST /spot/v4/query/history-orders"
      # Account endpoints (require HMAC auth)
      get_balance: "GET /spot/v1/wallet"
      get_account: "GET /spot/v1/wallet"
    wss_paths:
      ticker: "spot/ticker:{symbol}"
      kline1m: "spot/kline1m:{symbol}"
      depth5: "spot/depth5:{symbol}"
      depth20: "spot/depth20:{symbol}"
      depth50: "spot/depth50:{symbol}"
      trade: "spot/trade:{symbol}"
