# Uniswap DEX Configuration
# Uniswap Trading API configuration for decentralized exchange integration

id: uniswap
display_name: "Uniswap"
venue_type: dex
website: "https://uniswap.org"
api_doc: "https://api-docs.uniswap.org/"

# Base URLs for different services
base_urls:
  # Trading API (GraphQL)
  trading_api: "https://trade-api.gateway.uniswap.org/v1"

  # GraphQL endpoint (alternative)
  graphql: "https://api.thegraph.com/subgraphs/name/uniswap/uniswap-v3"

  # UniswapX (for advanced trading)
  uniswapx: "https://swapx.api.uniswap.org"

# Connection configuration
connection:
  type: http
  timeout: 30
  max_retries: 3

# Authentication - Uniswap Trading API requires API key
authentication:
  type: api_key
  header_name: "x-api-key"

# Rate limiting - Uniswap specific rate limits
rate_limits:
  - name: trading_api
    type: sliding_window
    interval: 60  # 1 minute
    limit: 1200  # requests per minute
    scope: global
  - name: graphql
    type: sliding_window
    interval: 60
    limit: 600
    scope: global

# Supported blockchains
chains:
  - "ETHEREUM"
  - "ARBITRUM"
  - "OPTIMISM"
  - "POLYGON"
  - "BSC"
  - "AVALANCHE"
  - "BASE"

# Router addresses for different chains
router_address:
  ETHEREUM: "0x68b3465833fb129eeae6d7305a3f870a770d97c5"
  ARBITRUM: "0x68b3465833fb129eeae6d7305a3f870a770d97c5"
