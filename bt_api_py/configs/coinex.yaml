# CoinEx Exchange Configuration
# API: V2  (https://docs.coinex.com/api/v2/)
# Auth: HMAC-SHA256  (X-COINEX-KEY / X-COINEX-SIGN / X-COINEX-TIMESTAMP)
# Response envelope: {"code": 0, "data": ..., "message": "OK"}
# Symbol format: BTCUSDT (base+quote, no separator)
id: coinex
display_name: CoinEx
venue_type: cex
website: https://www.coinex.com
api_doc: https://docs.coinex.com/api/v2/

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha256
  header_name: X-COINEX-KEY
  sign_header: X-COINEX-SIGN
  timestamp_header: X-COINEX-TIMESTAMP

kline_periods:
  1m: 1min
  3m: 3min
  5m: 5min
  15m: 15min
  30m: 30min
  1h: 1hour
  2h: 2hour
  4h: 4hour
  6h: 6hour
  12h: 12hour
  1d: 1day
  3d: 3day
  1w: 1week

legal_currency: &lc
  - USDT
  - USD
  - BTC
  - ETH
  - USDC

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 1200
    scope: global
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 600
    scope: global

asset_types:
  spot:
    exchange_name: COINEX___SPOT
    rest_url: "https://api.coinex.com"
    wss_url: "wss://socket.coinex.com/v2/"
    symbol_format: "{base}{quote}"
    legal_currency: *lc
    rest_paths:
      # Market Data (public)
      get_exchange_info: "GET /v2/spot/market"
      get_tick: "GET /v2/spot/ticker"
      get_depth: "GET /v2/spot/depth"
      get_trades: "GET /v2/spot/deals"
      get_kline: "GET /v2/spot/kline"
      get_index: "GET /v2/spot/index"
      # Account (signed)
      get_account: "GET /v2/account/info"
      get_balance: "GET /v2/assets/spot/balance"
      # Trading (signed)
      make_order: "POST /v2/spot/order"
      cancel_order: "DELETE /v2/spot/order"
      query_order: "GET /v2/spot/order-status"
      get_open_orders: "GET /v2/spot/pending-order"
      get_deals: "GET /v2/spot/user-deals"
      get_finished_orders: "GET /v2/spot/finished-order"
    kline_periods:
      1m: 1min
      3m: 3min
      5m: 5min
      15m: 15min
      30m: 30min
      1h: 1hour
      2h: 2hour
      4h: 4hour
      6h: 6hour
      12h: 12hour
      1d: 1day
      3d: 3day
      1w: 1week
