# Korbit Exchange Configuration
# API doc: https://docs.korbit.co.kr
# Auth: OAuth2 Bearer token (Authorization: Bearer {token})
# Symbol: {base}_{quote} lowercase (e.g. btc_krw)
id: korbit
display_name: Korbit
venue_type: cex
website: https://www.korbit.co.kr
api_doc: https://docs.korbit.co.kr

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: api_key
  header_name: Authorization

kline_periods:
  1m: "1m"
  3m: "3m"
  5m: "5m"
  15m: "15m"
  30m: "30m"
  1h: "1h"
  4h: "4h"
  1d: "1d"

legal_currency: &lc
  - KRW
  - BTC
  - ETH

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 1
    limit: 50
    scope: ip
  - name: order_api
    type: sliding_window
    interval: 1
    limit: 30
    scope: account
  - name: private_api
    type: sliding_window
    interval: 1
    limit: 50
    scope: account

asset_types:
  spot:
    exchange_name: KORBIT___SPOT
    rest_url: "https://api.korbit.co.kr"
    wss_url: "wss://ws-api.korbit.co.kr/v2/public"
    symbol_format: "{base}_{quote}"
    legal_currency: *lc
    rest_paths:
      # Public (GET, no auth)
      get_tick: "GET /v1/ticker/detailed"
      get_depth: "GET /v1/orderbook"
      get_deals: "GET /v1/transactions"
      get_exchange_info: "GET /v1/constants"
      get_kline: "GET /v1/chart/units"
      # Private (POST, auth required)
      make_order: "POST /v1/user/orders/buy"
      make_order_sell: "POST /v1/user/orders/sell"
      cancel_order: "POST /v1/user/orders/cancel"
      get_open_orders: "GET /v1/user/orders/open"
      get_balance: "GET /v1/user/balances"
      get_account: "GET /v1/user/balances"
    kline_periods:
      1m: "1m"
      3m: "3m"
      5m: "5m"
      15m: "15m"
      30m: "30m"
      1h: "1h"
      4h: "4h"
      1d: "1d"
