# Korbit Configuration
# Official API documentation: https://docs.korbit.co.kr

id: korbit
display_name: Korbit
venue_type: cex
website: https://www.korbit.co.kr
api_doc: https://docs.korbit.co.kr

# Base URLs
base_urls:
  rest:
    spot: https://api.korbit.co.kr
  wss:
    public: wss://ws-api.korbit.co.kr/v2/public
    private: wss://ws-api.korbit.co.kr/v2/private

# Connection
connection:
  type: http
  timeout: 10
  max_retries: 3

# Authentication (OAuth2 based API Key)
authentication:
  type: api_key
  header_name: Authorization

# Rate limits (based on official documentation)
rate_limits:
  - name: public_api
    type: sliding_window
    interval: 1
    limit: 50
    scope: ip
  - name: order_api
    type: sliding_window
    interval: 1
    limit: 30
    scope: account
  - name: cancel_order_api
    type: sliding_window
    interval: 1
    limit: 30
    scope: account
  - name: deposit_withdraw_api
    type: sliding_window
    interval: 1
    limit: 5
    scope: account
  - name: private_api
    type: sliding_window
    interval: 1
    limit: 50
    scope: account

# Kline periods supported by Korbit
kline_periods:
  1m: "1m"
  3m: "3m"
  5m: "5m"
  15m: "15m"
  30m: "30m"
  1h: "1h"
  4h: "4h"
  1d: "1d"

# Legal currencies (KRW focused Korean exchange)
legal_currency:
  - KRW
  - BTC
  - ETH

# Asset types
asset_types:
  spot:
    exchange_name: KorbitSpot
    symbol_format: "{base}_{quote}"

    # REST API paths
    rest_paths:
      base_url: ""
      get_server_time: "GET /v1/timestamp"
      get_ticker: "GET /v1/ticker/{symbol}"
      get_orderbook: "GET /v1/orderbook?symbol={symbol}"
      get_trades: "GET /v1/transactions?symbol={symbol}"
      get_klines: "GET /v1/chart/units/{symbol}"
      make_order: "POST /v1/orders/place"
      cancel_order: "DELETE /v1/orders/cancel"

    # WebSocket paths
    wss_paths:
      ticker: "ticker.{symbol}"
      orderbook: "orderbook.{symbol}"
      trade: "transaction.{symbol}"

    # Kline periods (asset-specific overrides)
    kline_periods:
      1m: "1m"
      3m: "3m"
      5m: "5m"
      15m: "15m"
      30m: "30m"
      1h: "1h"
      4h: "4h"
      1d: "1d"

    # Legal currencies for spot
    legal_currency:
      - KRW
      - BTC
      - ETH

    # Trading symbols
    symbols:
      - "btc_krw"
      - "eth_krw"
      - "xrp_krw"
      - "bch_krw"
      - "ltc_krw"
