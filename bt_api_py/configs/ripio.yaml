# Ripio Exchange Configuration
id: ripio
display_name: Ripio
venue_type: cex
website: https://ripio.com
api_doc: https://www.ripio.com/docs/

base_urls:
  rest:
    default: https://api.exchange.ripio.com
    spot: https://api.exchange.ripio.com
  wss:
    default: wss://api.exchange.ripio.com/ws
    spot: wss://api.exchange.ripio.com/ws

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: api_key
  header_name: Authorization

kline_periods:
  1m: "1"
  5m: "5"
  15m: "15"
  30m: "30"
  1h: "60"
  4h: "240"
  1d: "1440"
  1w: "10080"

legal_currency: [ARS, BRL, USD, USDT, BTC, ETH]

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 100
    scope: global
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 50
    scope: global

asset_types:
  spot:
    exchange_name: ripio
    symbol_format: "{base}_{quote}"
    legal_currency: [ARS, BRL, USD, USDT, BTC, ETH]
    rest_paths:
      get_server_time: "GET /api/v4/timestamp"
      get_tick: "GET /api/v4/ticker/:symbol"
      get_depth: "GET /api/v4/orderbook/:symbol"
      get_kline: "GET /api/v4/candles/:symbol"
      get_exchange_info: "GET /api/v4/symbols"
      get_trades: "GET /api/v4/trades/:symbol"
    wss_paths:
      ticker: ""
      depth: ""
      kline: ""
