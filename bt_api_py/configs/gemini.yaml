# Gemini 交易所统一配置
# 数据来源: bt_api_py/containers/exchanges/gemini_exchange_data.py
id: gemini
display_name: Gemini
venue_type: cex
website: https://www.gemini.com
api_doc: https://docs.gemini.com/

base_urls:
  rest:
    default: https://api.gemini.com
    sandbox: https://api.sandbox.gemini.com
  wss:
    public: wss://api.gemini.com/v1/marketdata
    private: wss://api.gemini.com/v1/order/events

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha384
  header_api_key: X-GEMINI-APIKEY
  header_payload: X-GEMINI-PAYLOAD
  header_signature: X-GEMINI-SIGNATURE

# 共享 kline 周期映射
kline_periods:
  1m: "1m"
  5m: "5m"
  15m: "15m"
  30m: "30m"
  1h: "1h"
  6h: "6h"
  1d: "1d"
  1w: "1w"
  1M: "1M"

# 订单状态映射
status_dict:
  new: active
  active: active
  filled: filled
  canceled: canceled
  rejected: rejected

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 120
    scope: global
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 600
    scope: global

# ═══════════════════════════════════════════════════════════════
# 共享 REST paths (YAML 锚点, 所有 asset_type 继承)
# ═══════════════════════════════════════════════════════════════
_shared_rest_paths: &shared_rest_paths
  # Trading
  make_order: "POST /v1/order/new"
  make_orders: "POST /v1/order/new"
  cancel_order: "POST /v1/order/cancel"
  cancel_orders: "POST /v1/order/cancel/all"
  query_order: "POST /v1/order/status"
  get_open_orders: "POST /v1/orders"
  get_order_history: "POST /v1/mytrades"

  # Account
  get_balance: "POST /v1/balances"
  get_account_info: "POST /v1/notionalbalances"
  get_transfers: "POST /v1/transfers"
  get_deposit_address: "POST /v1/addresses/{network}"
  withdraw: "POST /v1/withdraw/{currency}"
  get_withdraw_history: "POST /v1/deposit/{currency}/history"

  # Market Data
  get_symbols: "GET /v1/symbols"
  get_symbol_details: "GET /v1/symbols/details/{symbol}"
  get_ticker: "GET /v2/ticker/{symbol}"
  get_tickers: "GET /v2/ticker"
  get_depth: "GET /v1/book/{symbol}"
  get_trades: "GET /v1/trades/{symbol}"
  get_kline: "GET /v2/candles/{symbol}/{time_frame}"
  get_price_feed: "GET /v1/pricefeed"
  get_system_time: "GET /v1/time"

# ═══════════════════════════════════════════════════════════════
# Asset Types
# ═══════════════════════════════════════════════════════════════
asset_types:

  # ─── GeminiExchangeDataSpot (现货) ─────────────────────────
  spot:
    exchange_name: GEMINI
    symbol_format: "{base}{quote}"
    rest_paths:
      <<: *shared_rest_paths
    wss_paths:
      # Public Market Streams
      tick:
        channel: tickers
        symbol: "<symbol>"
      depth:
        channel: books
        symbol: "<symbol>"
      trades:
        channel: trades
        symbol: "<symbol>"
      kline:
        channel: candle
        symbol: "<symbol>"
        timeframe: "<period>"
      price_feed:
        channel: pricefeed
        symbol: "<symbol>"
      # Private Streams
      orders:
        channel: order_events
      account:
        channel: account_events
