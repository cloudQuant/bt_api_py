# Asset types configuration
asset_types:
  # Ethereum Mainnet
  ethereum:
    exchange_name: "UNISWAP___ETHEREUM"
    symbol_format: "{base}{quote}"
    chains_supported: ["ETHEREUM"]
    graphql_endpoints:
      subgraph: "https://api.thegraph.com/subgraphs/name/uniswap/uniswap-v3"
    rest_paths:
      graphql: "POST https://trade-api.gateway.uniswap.org/v1/graphql"
      get_tick: "POST /quote"
      get_pool: "POST /pools"
      get_swap_quote: "POST /quote"
      get_swappable_tokens: "POST /swappable_tokens"
      get_exchange_info: "POST /service"
    special_operations:
      swap: "POST /swap"
      limit_order: "POST /limit_order_quote"
      uniswapx_order: "POST /order"

