# Balancer DEX unified configuration
# Data source: bt_api_py/containers/exchanges/balancer_exchange_data.py
id: balancer
display_name: Balancer
venue_type: dex
website: https://balancer.fi
api_doc: https://docs.balancer.fi/api/graphql

base_urls:
  graphql_api: https://api-v3.balancer.fi/graphql
  subgraph_urls:
    MAINNET: https://api.thegraph.com/subgraphs/name/balancer-labs/balancer-v2
    POLYGON: https://api.thegraph.com/subgraphs/name/balancer-labs/balancer-v2-polygon
    ARBITRUM: https://api.thegraph.com/subgraphs/name/balancer-labs/balancer-v2-arbitrum
    OPTIMISM: https://api.thegraph.com/subgraphs/name/balancer-labs/balancer-v2-optimism
    GNOSIS: https://api.thegraph.com/subgraphs/name/balancer-labs/balancer-v2-gnosis
    AVALANCHE: https://api.thegraph.com/subgraphs/name/balancer-labs/balancer-v2-avalanche
    BASE: https://api.thegraph.com/subgraphs/name/balancer-labs/balancer-v2-base
  vault: "0xBA12222222228d8Ba445958a75a0704d566BF2C8"

connection:
  type: http
  timeout: 30
  max_retries: 3

authentication:
  type: none
  required: false

# Shared default legal currency list
legal_currency: [USDC, USDT, USD, BTC, ETH, BAL]

# GraphQL queries for Balancer operations
graphql_queries:
  get_pools: |
    query {
      pools(first: 1000, orderBy: totalLiquidity, orderDirection: desc) {
        id
        name
        symbol
        poolTokens {
          token {
            id
            symbol
            name
          }
          balance
        }
        totalLiquidity
        swapFee
        totalSwapVolume
        stableSwap {
          stable
        }
        type
      }
    }

  get_pool: |
    query GetPool($id: String!) {
      pool(id: $id) {
        id
        name
        symbol
        poolTokens {
          token {
            id
            symbol
            name
            decimals
          }
          balance
          share
        }
        totalLiquidity
        swapFee
        totalSwapVolume
        stableSwap {
          stable
        }
        type
        tokens(first: 10) {
          id
          symbol
          name
          decimals
          balance
          price
        }
      }
    }

  get_tick: |
    query GetTick($tokenId: String!, $block: Int) {
      token(id: $tokenId, block: { number: $block }) {
        id
        symbol
        name
        decimals
        derivedETH
        priceUSD
      }
    }

  get_swap_path: |
    query GetSwapPath($tokenIn: String!, $tokenOut: String!, $amount: BigDecimal!, $gasPrice: BigInt) {
      swaps(
        first: 1
        where: {
          tokenIn: $tokenIn
          tokenOut: $tokenOut
        }
        orderBy: timestamp
        orderDirection: desc
      ) {
        id
        pool {
          id
          name
          swapFee
          tokens {
            id
            symbol
          }
        }
        tokenIn
        tokenOut
        amountIn
        amountOut
        timestamp
      }
    }

  get_pool_events: |
    query GetPoolEvents($poolId: String!, $first: Int = 100, $skip: Int = 0) {
      poolEvents(
        where: { pool: $poolId }
        first: $first
        skip: $skip
        orderBy: timestamp
        orderDirection: desc
      ) {
        id
        pool {
          id
          name
        }
        event
        timestamp
        tx {
          id
          hash
        }
      }
    }

rate_limits:
  - name: graphql_requests
    type: sliding_window
    interval: 60
    limit: 600
    scope: global
    weight: 1
    description: "GraphQL API requests per minute"
  - name: subgraph_requests
    type: sliding_window
    interval: 60
    limit: 2000
    scope: global
    weight: 1
    description: "Subgraph queries per minute"
  - name: pool_queries
    type: token_bucket
    interval: 1
    limit: 100
    scope: endpoint
    weight: 10
    description: "Pool-heavy queries per second"

# ═══════════════════════════════════════════════════════════════
# Asset Types — Each subtype corresponds to BalancerExchangeData's subclass
# ═══════════════════════════════════════════════════════════════
asset_types:

  # ─── BalancerExchangeDataMainnet (MAINNET) ───────────────────
  mainnet:
    exchange_name: balancer_mainnet
    symbol_format: "{base}-{quote}"
    legal_currency: [USDC, USDT, USD, BTC, ETH, BAL]
    chains_supported: [MAINNET]
    graphql_endpoints:
      main: "https://api-v3.balancer.fi/graphql"
      subgraph: "https://api.thegraph.com/subgraphs/name/balancer-labs/balancer-v2"
    rest_paths:
      # General
      ping: "GET /api/v3/ping"
      get_server_time: "GET /api/v3/time"
      # Pool Data
      get_pools: "GRAPHQL { get_pools }"
      get_pool: "GRAPHQL { get_pool }"
      get_all_pools: "GRAPHQL { pools(first: 1000) { ...fullPool } }"
      get_pool_tokens: "GRAPHQL { pool(id: $id) { tokens { ...tokenData } } }"
      # Token Data
      get_token_prices: "GRAPHQL { tokens(where: { id_in: $ids }) { id, symbol, priceUSD } }"
      get_token_liquidity: "GRAPHQL { tokens(where: { id_in: $ids }) { id, totalLiquidity } }"
      # Swap Data
      get_spot_price: "GRAPHQL { pools(where: { id: $poolId }) { spotPrice(tokenIn: $tokenIn, tokenOut: $tokenOut) } }"
      get_swap_fee: "GRAPHQL { pools(where: { id: $poolId }) { swapFee } }"
      # Events
      get_pool_swaps: "GRAPHQL { swaps(where: { pool: $poolId }, first: 100) { ...swapData } }"
      get_pool_join_events: 'GRAPHQL { poolEvents(where: { pool: $poolId, event: "Join" }, first: 100) { ...eventData } }'
      get_pool_exit_events: 'GRAPHQL { poolEvents(where: { pool: $poolId, event: "Exit" }, first: 100) { ...eventData } }'
      get_pool_swap_events: 'GRAPHQL { poolEvents(where: { pool: $poolId, event: "Swap" }, first: 100) { ...eventData } }'
    graphql_paths:
      # Query operations
      query_pools: "query { pools(first: 1000, orderBy: totalLiquidity, orderDirection: desc) { id, name, symbol, totalLiquidity, swapFee } }"
      query_pool_by_id: "query($id: String!) { pool(id: $id) { id, name, symbol, totalLiquidity, swapFee } }"
      query_tokens_by_pool: "query($id: String!) { pool(id: $id) { tokens { id, symbol, name, decimals } } }"
      query_token_prices: "query($ids: [String]!) { tokens(where: { id_in: $ids }) { id, symbol, derivedETH, priceUSD } }"
      # Mutation operations (if needed)
      add_liquidity: "mutation($input: AddLiquidityInput!) { addLiquidity(input: $input) { id, amountUSD } }"
      remove_liquidity: "mutation($input: RemoveLiquidityInput!) { removeLiquidity(input: $input) { id, amountUSD } }"
      swap_tokens: "mutation($input: SwapInput!) { swap(input: $input) { id, amountIn, amountOut } }"
    # Special Balancer-specific operations
    special_operations:
      sor_optimization: "query GetSORPath($tokenIn: String!, $tokenOut: String!, $amount: BigDecimal!, gasPrice: BigInt) { swaps(tokenIn: $tokenIn, tokenOut: $tokenOut, first: 5, orderBy: amountOut) { amountOut, pool { id, swapFee } } }"
      get_pool_weights: "query($id: String!) { pool(id: $id) { poolTokens { balance, token { symbol, decimals } } } }"
      calculate_spot_price: "query($id: String!, $tokenIn: String!, $tokenOut: String!) { pool(id: $id) { spotPrice(tokenIn: $tokenIn, tokenOut: $tokenOut) } }"

  # ─── BalancerExchangeDataPolygon (POLYGON) ────────────────────
  polygon:
