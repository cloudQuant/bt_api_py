# Bybit Exchange Configuration
# Data source: bt_api_py/containers/exchanges/bybit_exchange_data.py
id: bybit
display_name: Bybit
venue_type: cex
website: https://www.bybit.com
api_doc: https://bybit-exchange.github.io/docs/v5/intro

base_urls:
  rest:
    spot: https://api.bybit.com
    swap: https://api.bybit.com
    inverse: https://api.bybit.com
    option: https://api.bybit.com
  wss:
    spot: wss://stream.bybit.com/v5/public/spot
    swap: wss://stream.bybit.com/v5/public/linear
    inverse: wss://stream.bybit.com/v5/public/inverse
    option: wss://stream.bybit.com/v5/public/option

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha256
  header_name: X-BAPI-API-KEY
  timestamp_key: X-BAPI-TIMESTAMP
  signature_key: X-BAPI-SIGN
  recv_window_key: X-BAPI-RECV-WINDOW

# Shared default kline periods mapping
kline_periods:
  1m: "1"
  3m: "3"
  5m: "5"
  15m: "15"
  30m: "30"
  1h: "60"
  2h: "120"
  4h: "240"
  6h: "360"
  12h: "720"
  1d: "D"
  1w: "W"
  1M: "M"

# Shared default legal currency list
legal_currency: [USDT, USDC, USD, BTC, ETH]

rate_limits:
  - name: request_weight
    type: sliding_window
    interval: 60
    limit: 1200
    scope: global
    weight: 1
    weight_map:
      "/v5/market/tickers": 1
      "/v5/market/klines": 1
      "/v5/market/orderbook": 1
      "/v5/account/wallet-balance": 1
      "/v5/position/list": 1
  - name: order_rate
    type: sliding_window
    interval: 10
    limit: 100
    scope: endpoint
    endpoint: "/v5/order/create"
    weight: 1
  - name: order_cancel_rate
    type: sliding_window
    interval: 10
    limit: 100
    scope: endpoint
    endpoint: "/v5/order/cancel"
    weight: 1

# ═══════════════════════════════════════════════════════════════
# Asset Types — Each subtype corresponds to BybitExchangeData subclass
# ═══════════════════════════════════════════════════════════════
asset_types:

  # ─── BybitExchangeDataSpot ──────────────────────────────────
  spot:
    exchange_name: bybitSpot
    symbol_format: "{base}{quote}"
    legal_currency: [USDT, USDC, USD, BTC, ETH]
    rest_paths:
      # General
      ping: "GET /v5/market/ping"
      get_server_time: "GET /v5/market/time"
      get_contract: "GET /v5/market/instruments-info?category=spot"

      # Market Data
      get_tick: "GET /v5/market/tickers?category=spot"
      get_depth: "GET /v5/market/orderbook?category=spot"
      get_incre_depth: "GET /v5/market/orderbook?category=spot"
      get_kline: "GET /v5/market/klines?category=spot"
      get_info: "GET /v5/market/tickers?category=spot"
      get_new_price: "GET /v5/market/trades?category=spot"
      get_historical_trades: "GET /v5/market/historical-trades?category=spot"
      get_agg_trades: "GET /v5/market/historical-trades?category=spot"
      get_market_rate: "GET /v5/market/ticker/price?category=spot"
      get_avg_price: "GET /v5/market/mark-price-kline?category=spot"
      get_funding_rate: "GET /v5/market/funding-rate?category=spot"

      # Account
      get_account: "GET /v5/account/wallet-balance"
      get_balance: "GET /v5/account/wallet-balance"
      get_fee: "GET /v5/fee-rate"
      get_order_rate_limit: "GET /v5/account/api-key"

      # Trade
      make_order: "POST /v5/order/create"
      make_order_test: "POST /v5/order/create/test"
      cancel_order: "POST /v5/order/cancel"
      cancel_all: "POST /v5/order/cancel-all"
      query_order: "GET /v5/order"
      get_open_orders: "GET /v5/order/active"
      get_all_orders: "GET /v5/order/history"
      get_deals: "GET /v5/execution/list"

      # Listen Key
      get_listen_key: "POST /v5/user/stream-key"
      refresh_listen_key: "POST /v5/user/stream-key/refresh"
      close_listen_key: "DELETE /v5/user/stream-key"

      # Additional endpoints
      get_symbol_info: "GET /v5/market/instruments-info?category=spot"
      get_order_history: "GET /v5/order/history"
      get_fills: "GET /v5/execution/list"

    wss_paths:
      # Market Streams
      agg_trade: "spottrade.{symbol}"
      trade: "spottrade.{symbol}"
      kline: "spotkline.{symbol}.{period}"
      mini_ticker: "spotmini_ticker.{symbol}"
      ticker: "spotticker.{symbol}"
      book_ticker: "spotbook_ticker.{symbol}"
      depth: "spotdepth.{symbol}"

      # All Market Streams
      all_ticker: "spottickers"
      all_book_ticker: "spotbook_tickers"

      # Aliases
      tick: "spotbook_ticker.{symbol}"
      tick_all: "spotbook_tickers"
      ticks: "spottickers"
      tickers: "spottickers"
      market: "spotbook_tickers"
      bidAsk: "spotbook_ticker.{symbol}"

      # User Data Streams
      orders: ""
      deals: ""
      balance: ""
      position: ""
      account: ""
      listen_key: ""

