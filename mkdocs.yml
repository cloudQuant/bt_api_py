# MkDocs 配置文件
# https://www.mkdocs.org/user-guide/configuration/

site_name: bt_api_py
site_description: 统一多交易所交易 API 框架 — 一套代码对接 Binance、OKX、HTX、CTP、Interactive Brokers
site_author: cloudQuant
site_url: https://cloudquant.github.io/bt_api_py/

# 仓库配置
repo_name: cloudQuant/bt_api_py
repo_url: https://github.com/cloudQuant/bt_api_py
edit_uri: edit/master/docs/

# 版权信息
copyright: Copyright &copy; 2024 cloudQuant. MIT License.

# 主题配置
theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/chart-line

# 插件配置
plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            unwrap_annotated: true
            merge_init_into_class: true
            docstring_section_style: table

# 额外配置
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cloudQuant/bt_api_py
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/bt_api_py/
      name: PyPI
  analytics:
    feedback:
      title: 这篇文档对您有帮助吗？
      ratings:
        - icon: material/thumb-up-outline
          name: 有帮助
          data: 1
          note: 感谢您的反馈！
        - icon: material/thumb-down-outline
          name: 需要改进
          data: 0
          note: 感谢您的反馈，我们将持续改进。

# Markdown 扩展
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 额外 CSS/JS
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

# 导航结构 — 遵循 Diátaxis 框架
# https://diataxis.fr/  (Tutorials | How-to Guides | Reference | Explanation)
nav:
  - 首页: index.md

  # ── 教程 (Tutorials) ─────────────────────────────────────────
  - 入门:
      - 安装: installation.md
      - 快速入门: quickstart.md
      - 常见问题: faq.md
      - 更新日志: change_log.md

  # ── 使用指南 (How-to Guides) ─────────────────────────────────
  - 使用指南:
      - 基础用法: usage_guide.md
      - 参数说明: params.md
      - 错误处理: error_handling.md
      - 最佳实践: best_practices.md
      - 安全实践: security_best_practices.md
      - 性能优化: performance.md
      - 代码示例: examples/api_examples.md

  # ── API 参考 (Reference) — 自动生成自源代码 ──────────────────
  - API 参考:
      - 概览: reference/index.md
      - BtApi: reference/bt_api.md
      - 认证配置: reference/auth_config.md
      - 异常体系: reference/exceptions.md
      - 注册表: reference/registry.md
      - 事件总线: reference/event_bus.md
      - 数据容器: api_reference/data_containers.md
      - WebSocket 订阅: api_reference/websocket.md

  # ── 交易所集成文档 ────────────────────────────────────────────
  - 交易所:
      - Binance:
          - 概览: binance/index.md
          - 现货 (SPOT):
              - 快速参考: binance/spot/README.md
              - REST API: binance/spot/rest-api.md
              - WebSocket 流: binance/spot/websocket-streams.md
              - WebSocket API: binance/spot/websocket-api.md
              - 用户数据流: binance/spot/user-data-stream.md
              - 枚举类型: binance/spot/enums.md
              - 错误码: binance/spot/errors.md
              - 交易规则: binance/spot/filters.md
          - 合约 (DERIVATIVES):
              - 概览: binance/derivatives/index.md
              - 快速开始: binance/derivatives/quick-start.md
          - 杠杆 (MARGIN):
              - 接口索引: binance/margin_trading/README.md
          - 算法交易 (ALGO):
              - 接口索引: binance/algo/README.md
              - 快速开始: binance/algo/quick-start.md
      - OKX:
          - 概览: okx/index.md
          - 交易账户: okx/trading_account.md
          - 订单交易: okx/order_book_trading_trade.md
          - 行情数据: okx/market_data.md
          - 公共数据: okx/public_data.md
          - 资金账户: okx/funding_account.md
          - 算法交易: okx/order_book_trading_algo.md
          - 网格交易: okx/order_book_trading_grid.md
          - 价差交易: okx/spread_trading.md
          - 大宗交易: okx/block_trading.md
          - 状态与错误: okx/status_announcement_error.md
      - HTX (Huobi):
          - 概览: htx/index.md
      - CTP (中国期货):
          - 快速入门: ctp_quickstart.md
      - Interactive Brokers:
          - 快速入门: ib_quickstart.md
          - 概览: ib_web_api/index.md
          - API 快速参考: ib_web_api/api_reference_quick.md
          - 实现指南: ib_web_api/implementation_guide.md
          - 交易 API: ib_web_api/trading.md
          - 账户管理: ib_web_api/account_management.md

  # ── 深度解读 (Explanation) ───────────────────────────────────
  - 深度解读:
      - 架构设计: architecture.md
      - 多策略架构: multi_strategy_architecture.md
      - 交易所集成模式: exchange_integration_patterns.md
      - 开发者指南: developer_guide.md

