# Bitso 交易所统一配置
# 数据来源: https://docs.bitso.com/bitso-api/
id: bitso
display_name: Bitso
venue_type: cex
website: https://bitso.com
api_doc: https://docs.bitso.com/bitso-api/

base_urls:
  rest:
    spot: https://bitso.com/api/v3
  wss:
    spot: wss://ws.bitso.com

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha256
  header_name: Authorization
  header_format: "Bitso {key}:{nonce}:{signature}"

# K线周期映射 - Bitso不支持REST K线，通过OHLC端点
kline_periods:
  1m: "60"
  3m: "180"
  5m: "300"
  15m: "900"
  30m: "1800"
  1h: "3600"
  2h: "7200"
  4h: "14400"
  6h: "21600"
  12h: "43200"
  1d: "86400"
  3d: "259200"

legal_currency: [MXN, USD, BTC, ETH, USDC]

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 60
    scope: ip
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 300
    scope: endpoint

asset_types:
  # ─── Spot Trading ────────────────────────────────────────
  spot:
    exchange_name: bitsoSpot
    symbol_format: "{base}_{quote}"
    legal_currency: [MXN, USD, BTC, ETH, USDC]
    rest_paths:
      # General
      ping: "GET /ping"
      get_server_time: "GET /time"
      get_contract: "GET /available_books"
      # Market Data
      get_tick: "GET /ticker"
      get_depth: "GET /order_book"
      get_kline: "GET /ohlc"
      get_new_price: "GET /trades"
      # Account
      get_account: "GET /balance"
      get_balance: "GET /balance"
      # Trade
      make_order: "POST /orders"
      cancel_order: "DELETE /orders"
      cancel_all: "DELETE /orders/all"
      query_order: "GET /orders"
      get_open_orders: "GET /open_orders"
      get_deals: "GET /user_trades"
    wss_paths:
      # Market Streams
      tick: "<book>@ticker"
      depth: "<book>@orders"
      trade: "<book>@trades"
      diff_depth: "<book>@diff-orders"
