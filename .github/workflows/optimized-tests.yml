name: Optimized Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run full test suite daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # Fast PR checks
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Run fast tests
      env:
        PR_CHECK: "true"
        SKIP_LIVE_TESTS: "true"
      run: |
        chmod +x scripts/run_optimized_tests.sh
        ./scripts/run_optimized_tests.sh
        
    - name: Upload coverage to Codecov
      if: github.event_name == 'pull_request'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        
    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          try {
            const coverage = fs.readFileSync('test_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Test Results\n\n' + coverage
            });
          } catch (e) {
            console.log('Could not read test report:', e);
          }

  # Comprehensive test suite
  full-test:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Run all tests
      env:
        SKIP_LIVE_TESTS: "true"
      run: |
        chmod +x scripts/run_optimized_tests.sh
        ./scripts/run_optimized_tests.sh
        
    - name: Run integration tests with API keys (if available)
      env:
        BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        BINANCE_SECRET: ${{ secrets.BINANCE_SECRET }}
        OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
        OKX_SECRET: ${{ secrets.OKX_SECRET }}
        OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
      if: env.BINANCE_API_KEY != ''
      run: |
        pytest -m "integration and (binance or okx)" --tb=short -q
        
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: ${{ matrix.os }}
        name: codecov-${{ matrix.os }}

  # Performance benchmarks
  performance:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Run performance tests
      run: |
        pytest tests/performance/ --tb=short -v --benchmark-json=benchmark.json
        
    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        comment-on-alert: true
        alert-threshold: '200%'
        fail-on-alert: true

  # Security scanning
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install bandit safety
        
    - name: Run security scan
      run: |
        bandit -r bt_api_py/ -f json -o bandit-report.json || true
        safety check --json --output safety-report.json || true
        
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # Test coverage analysis
  coverage-analysis:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Run coverage analysis
      run: |
        python scripts/analyze_coverage.py
        
    - name: Create coverage issue if needed
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          try {
            const report = fs.readFileSync('coverage_analysis.md', 'utf8');
            
            // Check for critical issues
            if (report.includes('Untested exchanges:')) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Test Coverage Analysis Report',
                body: report,
                labels: ['testing', 'coverage']
              });
            }
          } catch (e) {
            console.log('Could not run coverage analysis:', e);
          }

  # Build and package tests
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: |
        python -m build
        
    - name: Check package
      run: |
        twine check dist/*
        
    - name: Test installation
      run: |
        pip install dist/*.whl
        python -c "import bt_api_py; print('Package installed successfully')"

  # Notify on test failures
  notify:
    if: failure()
    needs: [pr-check, full-test, performance, security]
    runs-on: ubuntu-latest
    
    steps:
    - name: Notify on failure
      uses: actions/github-script@v6
      with:
        script: |
          const { owner, repo } = context.repo;
          const sha = context.sha;
          
          // Get failed jobs
          const runs = await github.rest.actions.listJobsForWorkflowRun({
            owner,
            repo,
            run_id: context.runId,
          });
          
          const failedJobs = runs.data.jobs.filter(job => job.conclusion === 'failure');
          const jobNames = failedJobs.map(job => job.name).join(', ');
          
          // Create issue or comment
          if (context.event_name === 'pull_request') {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body: `❌ **Test Failed**: ${jobNames}\n\nPlease check the [workflow run](https://github.com/${owner}/${repo}/actions/runs/${context.runId}) for details.`
            });
          } else {
            await github.rest.issues.create({
              owner,
              repo,
              title: `Test Suite Failed - ${sha.substring(0, 7)}`,
              body: `**Failed Jobs**: ${jobNames}\n\n[Workflow Run](https://github.com/${owner}/${repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'ci-failure']
            });
          }