# bt_api_py 微服务部署配置
# 支持百万级并发用户的Kubernetes集群部署

apiVersion: v1
kind: Namespace
metadata:
  name: btapi-prod
  labels:
    name: btapi-prod

---
# 用户服务部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: btapi-prod
  labels:
    app: user-service
    version: v2
spec:
  replicas: 20
  selector:
    matchLabels:
      app: user-service
      version: v2
  template:
    metadata:
      labels:
        app: user-service
        version: v2
    spec:
      containers:
      - name: user-service
        image: btapi/user-service:v2.0.0
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: btapi-secrets
              key: database-url
        - name: REDIS_CLUSTER_URL
          value: "redis://redis-cluster:6379"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: btapi-secrets
              key: jwt-secret
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: user-service-config
      nodeSelector:
        node-type: compute
      tolerations:
      - key: "compute"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: btapi-prod
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP

---
# 用户服务自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: btapi-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 10
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "500"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 5
        periodSeconds: 60
      selectPolicy: Max

---
# 订单服务部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: btapi-prod
  labels:
    app: order-service
    version: v2
spec:
  replicas: 30
  selector:
    matchLabels:
      app: order-service
      version: v2
  template:
    metadata:
      labels:
        app: order-service
        version: v2
    spec:
      containers:
      - name: order-service
        image: btapi/order-service:v2.0.0
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: btapi-secrets
              key: database-url
        - name: REDIS_CLUSTER_URL
          value: "redis://redis-cluster:6379"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: RISK_SERVICE_URL
          value: "http://risk-service:8000"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "768Mi"
            cpu: "750m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: btapi-prod
spec:
  selector:
    app: order-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP

---
# 订单服务自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: btapi-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 15
  maxReplicas: 200
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Pods
    pods:
      metric:
        name: orders_per_second
      target:
        type: AverageValue
        averageValue: "1000"

---
# 行情服务部署 (WebSocket密集型)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-service
  namespace: btapi-prod
  labels:
    app: market-service
    version: v2
spec:
  replicas: 50
  selector:
    matchLabels:
      app: market-service
      version: v2
  template:
    metadata:
      labels:
        app: market-service
        version: v2
    spec:
      containers:
      - name: market-service
        image: btapi/market-service:v2.0.0
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8080
          name: websocket
        env:
        - name: REDIS_CLUSTER_URL
          value: "redis://redis-cluster:6379"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: WEBSOCKET_MAX_CONNECTIONS
          value: "10000"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "3000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

---
apiVersion: v1
kind: Service
metadata:
  name: market-service
  namespace: btapi-prod
spec:
  selector:
    app: market-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: websocket
    port: 8080
    targetPort: 8080
  type: ClusterIP

---
# 风控服务部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-service
  namespace: btapi-prod
  labels:
    app: risk-service
    version: v2
spec:
  replicas: 10
  selector:
    matchLabels:
      app: risk-service
      version: v2
  template:
    metadata:
      labels:
        app: risk-service
        version: v2
    spec:
      containers:
      - name: risk-service
        image: btapi/risk-service:v2.0.0
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: btapi-secrets
              key: database-url
        - name: REDIS_CLUSTER_URL
          value: "redis://redis-cluster:6379"
        - name: MACHINE_LEARNING_MODEL_PATH
          value: "/app/models/risk_model.pkl"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1500m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        volumeMounts:
        - name: model-volume
          mountPath: /app/models
          readOnly: true
      volumes:
      - name: model-volume
        configMap:
          name: risk-models

---
apiVersion: v1
kind: Service
metadata:
  name: risk-service
  namespace: btapi-prod
spec:
  selector:
    app: risk-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP

---
# API网关配置
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: btapi-gateway
  namespace: btapi-prod
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
    hosts:
      - api.btapi.com
  - port:
      number: 443
      name: https
    tls:
      mode: SIMPLE
      credentialName: btapi-tls
    hosts:
      - api.btapi.com

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: btapi-routing
  namespace: btapi-prod
spec:
  hosts:
    - api.btapi.com
  gateways:
    - btapi-gateway
  http:
  - match:
    - uri:
        prefix: /api/v1/users
    route:
    - destination:
        host: user-service
        port:
          number: 8000
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
  - match:
    - uri:
        prefix: /api/v1/orders
    route:
    - destination:
        host: order-service
        port:
          number: 8000
    timeout: 5s
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 10ms
  - match:
    - uri:
        prefix: /api/v1/market
    route:
    - destination:
        host: market-service
        port:
          number: 8000
    timeout: 1s
  - match:
    - uri:
        prefix: /api/v1/risk
    route:
    - destination:
        host: risk-service
        port:
          number: 8000
    timeout: 10ms

---
# 服务监控配置
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: btapi-services
  namespace: btapi-prod
  labels:
    app: btapi-monitoring
spec:
  selector:
    matchLabels:
      app: user-service
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
# Pod中断预算
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-service-pdb
  namespace: btapi-prod
spec:
  minAvailable: 5
  selector:
    matchLabels:
      app: user-service
  maxUnavailable: 2

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: order-service-pdb
  namespace: btapi-prod
spec:
  minAvailable: 10
  selector:
    matchLabels:
      app: order-service
  maxUnavailable: 5

---
# 网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: btapi-network-policy
  namespace: btapi-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    - namespaceSelector:
        matchLabels:
          name: btapi-prod
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: btapi-prod
    - namespaceSelector:
        matchLabels:
          name: database
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 9092
    - protocol: TCP
      port: 9200

---
# 资源配额
apiVersion: v1
kind: ResourceQuota
metadata:
  name: btapi-quota
  namespace: btapi-prod
spec:
  hard:
    requests.cpu: "50"
    requests.memory: 100Gi
    limits.cpu: "100"
    limits.memory: 200Gi
    persistentvolumeclaims: "10"
    pods: "500"
    services: "20"
    secrets: "50"
    configmaps: "50"

---
# 限流配置
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: btapi-ratelimit
  namespace: btapi-prod
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context:
        listener:
          filterChain:
            filter:
              name: "envoy.filters.network.http_connection_manager"
              subFilter:
                name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.local_ratelimit
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
          stat_prefix: http_local_rate_limiter
          stage_enforcement:
            first_stage:
              enable: "on"
              percentage: 100
         Descriptors:
          - entries:
              key: remote_address
              value: "100"
              rate_limit:
                unit: MINUTE
                requests_per_unit: 1000