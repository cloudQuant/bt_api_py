# Swyftx Configuration
# Australian cryptocurrency exchange

id: swyftx
display_name: "Swyftx"
venue_type: cex
website: "https://swyftx.com"
api_doc: "https://help.swyftx.com"

# Base URLs (estimated - not publicly documented)
base_urls:
  rest:
    spot: "https://api.swyftx.com.au"
  wss:
    spot: "wss://api.swyftx.com.au"

# Connection configuration
connection:
  type: http
  timeout: 30
  max_retries: 3

# Authentication
authentication:
  type: api_key
  header_name: "Authorization"

# Rate limits (estimated - not publicly documented)
rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 120
    scope: global
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 60
    scope: global

# Asset types
asset_types:
  spot:
    exchange_name: "SWYFTX___SPOT"
    symbol_format: "{base}-{quote}"
    rest_paths:
      get_server_time: "GET /api/v1/time"
      get_ticker: "GET /api/v1/markets/{id}/ticker"
      get_depth: "GET /api/v1/markets/{id}/orderbook"
      get_kline: "GET /api/v1/markets/{id}/candles"
      get_exchange_info: "GET /api/v1/markets"
    wss_paths:
      tick: "ticker"
      depth: "orderbook"
      trade: "trades"

# Kline periods
kline_periods:
  "1m": "1m"
  "5m": "5m"
  "15m": "15m"
  "30m": "30m"
  "1h": "1h"
  "4h": "4h"
  "1d": "1d"
  "1w": "1w"

# Legal currencies
legal_currency:
  - "AUD"
  - "USD"
  - "BTC"
  - "ETH"
  - "USDT"

# Status dictionary
status_dict:
  PENDING: "0"
  OPEN: "1"
  FILLED: "2"
  PARTIALLY_FILLED: "3"
  CANCELLED: "4"
  EXPIRED: "5"
