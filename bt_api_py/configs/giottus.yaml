id: giottus
display_name: Giottus
venue_type: cex
website: https://www.giottus.com
api_doc: https://api.giottus.com/
base_urls:
  rest:
    default: https://api.giottus.com
    spot: https://api.giottus.com
  wss:
    default: wss://api.giottus.com
    spot: wss://api.giottus.com
authentication:
  type: api_key
  header_name: X-API-KEY
kline_periods:
  1m: 1m
  5m: 5m
  15m: 15m
  30m: 30m
  1h: 1h
  4h: 4h
  1d: 1d
  1w: 1w
legal_currency: &id001
- INR
- USDT
- USD
- BTC
- ETH
rate_limits:
- name: public_api
  type: sliding_window
  interval: 60
  limit: 100
  scope: global
- name: private_api
  type: sliding_window
  interval: 60
  limit: 50
  scope: global
asset_types:
  spot:
    exchange_name: giottusSpot
    rest_paths:
      get_server_time: GET /v1/time
      get_ticker: GET /v1/ticker
      get_depth: GET /v1/orderbook
      get_kline: GET /v1/klines
      get_markets: GET /v1/markets
    wss_paths:
      tick: '{symbol}@ticker'
      depth: '{symbol}@depth'
    symbol_format: '{base}/{quote}'
    legal_currency: *id001
connection:
  type: http
  timeout: 10
  max_retries: 3
