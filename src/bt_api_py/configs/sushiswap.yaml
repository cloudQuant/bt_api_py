# SushiSwap Configuration
# Multi-chain DEX aggregator

id: sushiswap
display_name: "SushiSwap"
venue_type: dex
website: "https://www.sushi.com"
api_doc: "https://docs.sushi.com"

# Base URLs
base_urls:
  rest:
    ethereum: "https://api.sushi.com"
    arbitrum: "https://api.sushi.com"
    polygon: "https://api.sushi.com"
    optimism: "https://api.sushi.com"
    bsc: "https://api.sushi.com"
    avalanche: "https://api.sushi.com"
    fantom: "https://api.sushi.com"
    celo: "https://api.sushi.com"
    moonbeam: "https://api.sushi.com"
    moonriver: "https://api.sushi.com"
  wss: {}

# Connection configuration
connection:
  type: http
  timeout: 30
  max_retries: 3

# Authentication (optional API key for higher limits)
authentication:
  type: none
  header_name: "x-api-key"

# Rate limits
rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 300
    scope: global

# Supported chains
chains:
  - "ETHEREUM"
  - "ARBITRUM"
  - "POLYGON"
  - "OPTIMISM"
  - "BSC"
  - "AVALANCHE"
  - "FANTOM"
  - "CELO"
  - "MOONBEAM"
  - "MOONRIVER"

# Chain IDs
chain_ids:
  ETHEREUM: "1"
  ARBITRUM: "42161"
  POLYGON: "137"
  OPTIMISM: "10"
  BSC: "56"
  AVALANCHE: "43114"
  FANTOM: "250"
  CELO: "42220"
  MOONBEAM: "1284"
  MOONRIVER: "1285"

# Router addresses (custom field for DEX - accessed via raw config)
router_addresses:
  ETHEREUM: "0xd9e1cE17f2641f24aE83637ab66a2cca9C378B9F"
  ARBITRUM: "0x1b02dA8Cb0d097eB8D57A175b88c7D8b47997506"
  POLYGON: "0x1b02dA8Cb0d097eB8D57A175b88c7D8b47997506"
  OPTIMISM: "0x1b02dA8Cb0d097eB8D57A175b88c7D8b47997506"
  BSC: "0x1b02dA8Cb0d097eB8D57A175b88c7D8b47997506"
  AVALANCHE: "0x1b02dA8Cb0d097eB8D57A175b88c7D8b47997506"

# Asset types per chain
asset_types:
  ethereum:
    exchange_name: "SUSHISWAP___ETHEREUM"
    symbol_format: "{base}/{quote}"
    rest_paths:
      get_tick: "GET /price/v1/1/{address}"
      get_pool: "GET /pool/v1/1/{address}"
      get_pools: "GET /pools/v1/1"
      get_quote: "GET /quote/v7/1"
      get_swap: "GET /swap/v7/1"
      get_exchange_info: "GET /tokens/v1/1"
    legal_currency: ["ETH", "USDC", "USDT"]
    chains_supported: ["ETHEREUM"]

  arbitrum:
    exchange_name: "SUSHISWAP___ARBITRUM"
    symbol_format: "{base}/{quote}"
    rest_paths:
      get_tick: "GET /price/v1/42161/{address}"
      get_pool: "GET /pool/v1/42161/{address}"
      get_pools: "GET /pools/v1/42161"
      get_quote: "GET /quote/v7/42161"
      get_swap: "GET /swap/v7/42161"
      get_exchange_info: "GET /tokens/v1/42161"
    legal_currency: ["ETH", "USDC", "USDT"]
    chains_supported: ["ARBITRUM"]

  polygon:
    exchange_name: "SUSHISWAP___POLYGON"
    symbol_format: "{base}/{quote}"
    rest_paths:
      get_tick: "GET /price/v1/137/{address}"
      get_pool: "GET /pool/v1/137/{address}"
      get_pools: "GET /pools/v1/137"
      get_quote: "GET /quote/v7/137"
      get_swap: "GET /swap/v7/137"
      get_exchange_info: "GET /tokens/v1/137"
    legal_currency: ["MATIC", "USDC", "USDT"]
    chains_supported: ["POLYGON"]

  optimism:
    exchange_name: "SUSHISWAP___OPTIMISM"
    symbol_format: "{base}/{quote}"
    rest_paths:
      get_tick: "GET /price/v1/10/{address}"
      get_pool: "GET /pool/v1/10/{address}"
      get_pools: "GET /pools/v1/10"
      get_quote: "GET /quote/v7/10"
      get_swap: "GET /swap/v7/10"
      get_exchange_info: "GET /tokens/v1/10"
    legal_currency: ["ETH", "USDC", "USDT"]
    chains_supported: ["OPTIMISM"]

  bsc:
    exchange_name: "SUSHISWAP___BSC"
    symbol_format: "{base}/{quote}"
    rest_paths:
      get_tick: "GET /price/v1/56/{address}"
      get_pool: "GET /pool/v1/56/{address}"
      get_pools: "GET /pools/v1/56"
      get_quote: "GET /quote/v7/56"
      get_swap: "GET /swap/v7/56"
      get_exchange_info: "GET /tokens/v1/56"
    legal_currency: ["BNB", "USDC", "USDT"]
    chains_supported: ["BSC"]

  avalanche:
    exchange_name: "SUSHISWAP___AVALANCHE"
    symbol_format: "{base}/{quote}"
    rest_paths:
      get_tick: "GET /price/v1/43114/{address}"
      get_pool: "GET /pool/v1/43114/{address}"
      get_pools: "GET /pools/v1/43114"
      get_quote: "GET /quote/v7/43114"
      get_swap: "GET /swap/v7/43114"
      get_exchange_info: "GET /tokens/v1/43114"
    legal_currency: ["AVAX", "USDC", "USDT"]
    chains_supported: ["AVALANCHE"]

# Kline periods (not directly supported by SushiSwap API)
kline_periods:
  "1m": "1MINUTE"
  "5m": "5MINUTES"
  "15m": "15MINUTES"
  "30m": "30MINUTES"
  "1h": "1HOUR"
  "4h": "4HOURS"
  "1d": "1DAY"

# Legal currencies
legal_currency:
  - "ETH"
  - "WBTC"
  - "USDC"
  - "USDT"
  - "DAI"
  - "MATIC"
  - "AVAX"
  - "FTM"

# Status dictionary
status_dict:
  PENDING: "0"
  OPEN: "1"
  FILLED: "2"
  PARTIALLY_FILLED: "3"
  CANCELLED: "4"
  EXPIRED: "5"
  FAILED: "6"

# Exchange ID mapping (example pool addresses)
exchange_id_map:
  "ETH-USDC": "0x39ea79f16d1b6f8fb792a676a2bbafbf7c3b12eb-A0b86991c6218b36c1d19d4a2e9eb0ce3606eb48"
