id: zebpay
display_name: Zebpay
venue_type: cex
website: https://www.zebpay.com
api_doc: https://github.com/zebpay/zebpay-api-references
base_urls:
  rest:
    default: https://sapi.zebpay.com
    spot: https://sapi.zebpay.com
  wss:
    default: wss://stream.zebpay.com
    spot: wss://stream.zebpay.com
authentication:
  type: hmac_sha256
  header_name: X-AUTH-APIKEY
kline_periods:
  1m: 1m
  5m: 5m
  15m: 15m
  30m: 30m
  1h: 1h
  2h: 2h
  4h: 4h
  12h: 12h
  1d: 1d
  1w: 1w
legal_currency: &id001
- INR
- USDT
rate_limits:
- name: public_api
  type: sliding_window
  interval: 1
  limit: 20
  scope: global
- name: private_api
  type: sliding_window
  interval: 1
  limit: 10
  scope: global
asset_types:
  spot:
    exchange_name: zebpaySpot
    rest_paths:
      get_server_time: GET /api/v2/system/time
      get_ticker: GET /api/v2/market/ticker
      get_depth: GET /api/v2/market/orderbook
      get_kline: GET /api/v2/market/klines
      get_markets: GET /api/v2/ex/exchangeInfo
    wss_paths:
      tick: '{symbol}@ticker'
    symbol_format: '{base}/{quote}'
    legal_currency: *id001
connection:
  type: http
  timeout: 10
  max_retries: 3
