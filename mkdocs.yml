# MkDocs 配置文件
# https://www.mkdocs.org/user-guide/configuration/

site_name: bt_api_py
site_description: 统一多交易所交易 API 框架 — 一套代码对接 Binance、OKX、HTX、CTP、Interactive Brokers
site_author: cloudQuant
site_url: https://cloudquant.github.io/bt_api_py/

# 仓库配置
repo_name: cloudQuant/bt_api_py
repo_url: https://github.com/cloudQuant/bt_api_py
edit_uri: edit/master/docs/

# 版权信息
copyright: Copyright &copy; 2024 cloudQuant. MIT License.

# 主题配置
theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/chart-line

# 插件配置
plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            unwrap_annotated: true
            merge_init_into_class: true
            docstring_section_style: table

# 额外配置
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cloudQuant/bt_api_py
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/bt_api_py/
      name: PyPI
  analytics:
    feedback:
      title: 这篇文档对您有帮助吗？
      ratings:
        - icon: material/thumb-up-outline
          name: 有帮助
          data: 1
          note: 感谢您的反馈！
        - icon: material/thumb-down-outline
          name: 需要改进
          data: 0
          note: 感谢您的反馈，我们将持续改进。

# Markdown 扩展
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 额外 CSS/JS
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

# 导航结构 — 遵循 Diátaxis 框架
