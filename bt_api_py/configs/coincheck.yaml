id: coincheck
display_name: Coincheck
venue_type: cex
website: https://coincheck.com
api_doc: https://coincheck.com/documents/exchange/api
base_urls:
  rest:
    default: https://coincheck.com
    spot: https://coincheck.com
  wss:
    default: wss://ws-api.coincheck.com
    spot: wss://ws-api.coincheck.com
authentication:
  type: hmac_sha256
  header_name: ACCESS-SIGNATURE
kline_periods:
  1m: 1m
  5m: 5m
  15m: 15m
  30m: 30m
  1h: 1h
  4h: 4h
  1d: 1d
  1w: 1w
legal_currency: &id001
- JPY
rate_limits:
- name: public_api
  type: sliding_window
  interval: 60
  limit: 600
  scope: global
- name: trading_api
  type: sliding_window
  interval: 1
  limit: 4
  scope: global
asset_types:
  spot:
    exchange_name: coincheckSpot
    rest_paths:
      get_server_time: GET /api/ticker
      get_ticker: GET /api/ticker
      get_depth: GET /api/order_books
      get_trades: GET /api/trades
      get_rate: GET /api/rate/{pair}
    symbol_format: '{base}/{quote}'
    legal_currency: *id001
connection:
  type: http
  timeout: 10
  max_retries: 3
