id: exmo
display_name: EXMO
venue_type: cex
website: https://exmo.com
api_doc: https://exmo.me/en/api_doc
base_urls:
  rest:
    default: https://api.exmo.com/v1.1
    spot: https://api.exmo.com/v1.1
  wss:
    default: wss://ws.exmo.me/v1.1
    spot: wss://ws.exmo.me/v1.1
authentication:
  type: hmac_sha512
  header_name: Key
kline_periods:
  1m: '1'
  5m: '5'
  15m: '15'
  30m: '30'
  1h: '60'
  2h: '120'
  4h: '240'
  1d: D
  1w: W
  1M: M
legal_currency: &id001
- USDT
- USD
- EUR
- UAH
- RUB
- GBP
- PLN
- TRY
- BTC
- ETH
rate_limits:
- name: public_api
  type: sliding_window
  interval: 1
  limit: 10
  scope: global
- name: private_api
  type: sliding_window
  interval: 1
  limit: 10
  scope: global
asset_types:
  spot:
    exchange_name: exmoSpot
    rest_paths:
      get_server_time: GET /time
      get_ticker: GET /ticker
      get_depth: GET /order_book
      get_kline: GET /candles_history
      get_trades: GET /trades
      get_currencies: GET /currency
      get_pair_settings: GET /pair_settings
    wss_paths:
      ticker: '{symbol}@ticker'
      depth: '{symbol}@depth'
      trades: '{symbol}@trades'
    symbol_format: '{base}/{quote}'
    legal_currency: *id001
connection:
  type: http
  timeout: 10
  max_retries: 3
