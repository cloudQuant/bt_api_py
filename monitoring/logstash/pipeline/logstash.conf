input {
  tcp {
    port => 5000
    codec => json
  }
  
  http {
    port => 5044
    codec => json
  }
}

filter {
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{+yyyy-MM-dd'T'HH:mm:ss.SSSZ}" }
    }
  }
  
  # Parse log level
  if [level] {
    mutate {
      add_field => { "log_level" => "%{level}" }
    }
  }
  
  # Add environment info
  mutate {
    add_field => { "environment" => "production" }
    add_field => { "service" => "bt_api_py" }
  }
  
  # Extract exchange name if present
  if [exchange_name] {
    mutate {
      add_field => { "exchange" => "%{exchange_name}" }
    }
  }
  
  # Parse duration to milliseconds
  if [duration_ms] {
    mutate {
      convert => { "duration_ms" => "float" }
    }
  }
  
  # Handle error information
  if [error] {
    if [error][type] {
      mutate {
        add_field => { "error_type" => "%{[error][type]}" }
      }
    }
    if [error][message] {
      mutate {
        add_field => { "error_message" => "%{[error][message]}" }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "bt_api_py-%{+YYYY.MM.dd}"
    template_name => "bt_api_py"
    template_pattern => "bt_api_py-*"
    template => {
      "index_patterns" => ["bt_api_py-*"],
      "settings" => {
        "number_of_shards" => 1,
        "number_of_replicas" => 0
      },
      "mappings" => {
        "properties" => {
          "timestamp" => { "type" => "date" },
          "level" => { "type" => "keyword" },
          "message" => { "type" => "text" },
          "correlation_id" => { "type" => "keyword" },
          "request_id" => { "type" => "keyword" },
          "user_id" => { "type" => "keyword" },
          "session_id" => { "type" => "keyword" },
          "exchange_name" => { "type" => "keyword" },
          "component" => { "type" => "keyword" },
          "function" => { "type" => "keyword" },
          "line_number" => { "type" => "integer" },
          "duration_ms" => { "type" => "float" },
          "error" => {
            "properties" => {
              "type" => { "type" => "keyword" },
              "message" => { "type" => "text" },
              "traceback" => { "type" => "text" }
            }
          },
          "metadata" => { "type" => "object" }
        }
      }
    }
  }
  
  # Debug output to console
  stdout {
    codec => rubydebug
  }
}