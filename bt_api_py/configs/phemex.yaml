# Phemex Exchange Configuration
id: phemex
display_name: Phemex
venue_type: cex
website: https://phemex.com
api_doc: https://github.com/phemex/phemex-api-docs

base_urls:
  rest:
    default: https://api.phemex.com
    spot: https://api.phemex.com
    perpetual: https://api.phemex.com
  wss:
    default: wss://ws.phemex.com
    spot: wss://ws.phemex.com
    perpetual: wss://ws.phemex.com

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: api_key
  header_name: x-phemex-access-token

kline_periods:
  1m: "60"
  5m: "300"
  15m: "900"
  30m: "1800"
  1h: "3600"
  4h: "14400"
  1d: "86400"
  1w: "604800"

legal_currency: [USDT, USD, BTC, ETH]

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 300
    scope: global
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 120
    scope: global

asset_types:
  spot:
    exchange_name: PHEMEX___SPOT
    symbol_format: "s{base}{quote}"
    legal_currency: [USDT, USD, BTC, ETH]
    rest_paths:
      get_server_time: "GET /exchange/public/md/v2/timestamp"
      get_exchange_info: "GET /public/products"
      get_tick: "GET /md/spot/ticker/24hr"
      get_depth: "GET /md/v2/orderbook"
      get_kline: "GET /md/v2/kline"
      get_trades: "GET /md/v2/trade"
      get_account: "GET /spot/wallets"
      get_balance: "GET /spot/wallets"
      make_order: "POST /spot/orders/create"
      cancel_order: "DELETE /spot/orders"
      query_order: "GET /spot/orders/active"
      get_open_orders: "GET /spot/orders/active"
    wss_paths:
      ticker: "spot_market24h.v2.{symbol}"
      depth: "orderbook.v2.{symbol}"
      kline: "kline.v2.{resolution}.{symbol}"
      trades: "trade.v2.{symbol}"

  perpetual:
    exchange_name: PHEMEX___PERPETUAL
    symbol_format: "{base}{quote}"
    legal_currency: [USDT, USD, BTC]
    rest_paths:
      get_server_time: "GET /exchange/public/md/v2/timestamp"
      get_exchange_info: "GET /public/products"
      get_tick: "GET /md/v2/ticker/24hr"
      get_depth: "GET /md/v2/orderbook"
      get_kline: "GET /md/v2/kline"
      get_trades: "GET /md/v2/trade"
      get_account: "GET /g-accounts/accountPositions"
      get_balance: "GET /g-accounts/accountPositions"
      make_order: "POST /g-orders/create"
      cancel_order: "DELETE /g-orders/cancel"
      query_order: "GET /g-orders/activeList"
      get_open_orders: "GET /g-orders/activeList"
    wss_paths:
      ticker: "tick.v2.{symbol}"
      depth: "orderbook.v2.{symbol}"
      kline: "kline.v2.{resolution}.{symbol}"
      trades: "trade.v2.{symbol}"
