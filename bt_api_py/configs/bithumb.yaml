id: bithumb
display_name: Bithumb
venue_type: cex
website: https://www.bithumb.pro
api_doc: https://github.com/bithumb-pro/bithumb.pro-official-api-docs
base_urls:
  rest:
    default: https://global-openapi.bithumb.pro/openapi/v1
    spot: https://global-openapi.bithumb.pro/openapi/v1
  wss:
    default: wss://global-api.bithumb.pro/message/realtime
    spot: wss://global-api.bithumb.pro/message/realtime
authentication:
  type: hmac_sha256
  header_name: X-BM-KEY
kline_periods:
  1m: m1
  3m: m3
  5m: m5
  15m: m15
  30m: m30
  1h: h1
  2h: h2
  4h: h4
  6h: h6
  8h: h8
  12h: h12
  1d: d1
  3d: d3
  1w: w1
  1M: M1
legal_currency: &id001
- USDT
- USD
- BTC
- ETH
- KRW
rate_limits:
- name: public_api
  type: sliding_window
  interval: 60
  limit: 600
  scope: global
- name: private_api
  type: sliding_window
  interval: 1
  limit: 10
  scope: global
asset_types:
  spot:
    exchange_name: bithumbSpot
    rest_paths:
      get_server_time: GET /spot/time
      get_ticker: GET /spot/ticker
      get_depth: GET /spot/orderBook
      get_kline: GET /spot/kline
      get_trades: GET /spot/trades
      get_config: GET /spot/config
      place_order: POST /spot/placeOrder
      cancel_order: POST /spot/cancelOrder
      order_detail: POST /spot/orderDetail
      single_order: POST /spot/singleOrder
      order_list: POST /spot/orderList
      asset_list: POST /spot/assetList
    wss_paths:
      ticker: TICKER:{symbol}
      orderbook: ORDERBOOK:{symbol}
      trade: TRADE:{symbol}
    symbol_format: '{base}/{quote}'
    legal_currency: *id001
connection:
  type: http
  timeout: 10
  max_retries: 3
