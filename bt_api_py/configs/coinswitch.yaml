# CoinSwitch Exchange Configuration
# API: REST V2  (https://docs.coinswitch.co/)
# Auth: API key in header x-api-key
# Response: {"data": ...} or {"error": ...}
# Symbol: pair string "BTCINR"
# No WebSocket support
id: coinswitch
display_name: CoinSwitch
venue_type: cex
website: https://coinswitch.co
api_doc: https://docs.coinswitch.co/

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: api_key
  header_name: x-api-key

kline_periods:
  1m: "1"
  5m: "5"
  15m: "15"
  30m: "30"
  1h: "60"
  4h: "240"
  1d: "D"

legal_currency: &lc
  - INR
  - USD
  - EUR
  - USDT
  - BTC
  - ETH

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 60
    limit: 100
    scope: global
  - name: private_api
    type: sliding_window
    interval: 60
    limit: 50
    scope: global

asset_types:
  spot:
    exchange_name: COINSWITCH___SPOT
    rest_url: "https://api.coinswitch.co"
    wss_url: ""
    symbol_format: "{base}{quote}"
    legal_currency: *lc
    rest_paths:
      # Market data (GET)
      get_tick: "GET /v2/tickers"
      get_exchange_info: "GET /v2/markets"
      get_trade_history: "GET /v2/trades"
      # Account (GET, auth required)
      get_balance: "GET /v2/account/balance"
      get_account: "GET /v2/account/balance"
      # Trading (POST / DELETE, auth required)
      make_order: "POST /v2/orders"
      cancel_order: "DELETE /v2/orders"
      get_open_orders: "GET /v2/orders"
    kline_periods:
      1m: "1"
      5m: "5"
      15m: "15"
      30m: "30"
      1h: "60"
      4h: "240"
      1d: "D"
