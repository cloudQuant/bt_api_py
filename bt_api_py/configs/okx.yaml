  # ─── OkxExchangeDataSwap (永续合约 USDT-M) ─────────────────
  swap:
    exchange_name: OkxSwap
    symbol_format: "{base}-{quote}-SWAP"
    rest_paths:
      <<: *shared_rest_paths
    wss_paths:
      # Public Market Streams
      tick:
        channel: tickers
        instType: SWAP
        instId: "<symbol>"
      depth:
        channel: books5
        instType: SWAP
        instId: "<symbol>"
      books:
        channel: books
        instType: SWAP
        instId: "<symbol>"
      bidAsk:
        channel: bbo-tbt
        instType: SWAP
        instId: "<symbol>"
      increDepthFlow:
        channel: books50-l2-tbt
        instId: "<symbol>"
      books_l2_tbt:
        channel: books-l2-tbt
        instId: "<symbol>"
      books_sbe_tbt:
        channel: books-sbe-tbt
        instId: "<symbol>"
      trades:
        channel: trades
        instId: "<symbol>"
      trades_all:
        channel: trades-all
        instId: "<symbol>"
      opt_trades:
        channel: opt-trades
        instFamily: "<symbol>"
      call_auction_details:
        channel: call-auction-details
        instId: "<symbol>"
      funding_rate:
        channel: funding-rate
        instId: "<symbol>"
      mark_price:
        channel: mark-price
        instId: "<symbol>"
      open_interest:
        channel: open-interest
        instId: "<symbol>"
      price_limit:
        channel: price-limit
        instId: "<symbol>"
      opt_summary:
        channel: opt-summary
        instType: OPTION
      estimated_price:
        channel: estimated-price
        instId: "<symbol>"
      index_tickers:
        channel: index-tickers
        instId: "<symbol>"
      instruments:
        channel: instruments
        instType: SWAP
      liquidation_orders:
        channel: liquidation-orders
        instType: SWAP
      adl_warning:
        channel: adl-warning
        instType: SWAP
      status:
        channel: status
      # Private Streams
      orders:
        channel: orders
        instType: SWAP
        instId: "<symbol>"
      fills:
        channel: fills
        instType: SWAP
        instId: "<symbol>"
      account:
        channel: account
        instType: SWAP
        instId: "<symbol>"
      positions:
        channel: positions
        instType: SWAP
        instId: "<symbol>"
      balance_position:
        channel: balance_and_position
      liquidation_warning:
        channel: liquidation-warning
        instType: SWAP
      account_greeks:
        channel: account-greeks
      deposit_info:
        channel: deposit-info
      withdrawal_info:
        channel: withdrawal-info
      # Business Streams
      kline:
        channel: "candle<period>"
        instId: "<symbol>"
      kline_index:
        channel: "index-candle<period>"
        instId: "<symbol>"
      kline_mark_price:
        channel: "mark-price-candle<period>"
        instId: "<symbol>"
      economic_calendar:
        channel: economic-calendar
      lead_trading_notification:
        channel: lead-trading-notification
      algo_orders:
        channel: orders-algo
        instType: SWAP
        instId: "<symbol>"
      grid_orders_spot:
        channel: grid-orders-spot
      algo_advance:
        channel: algo-advance
        instType: SWAP
        instId: "<symbol>"
      grid_orders_contract:
        channel: grid-orders-contract
      grid_positions:
        channel: grid-positions
        instType: SWAP
      grid_sub_orders:
        channel: grid-sub-orders
        instType: SWAP
      # Spread WS
      sprd_orders:
        channel: sprd-orders
      sprd_tickers:
        channel: sprd-tickers
        sprdId: "<symbol>"
      # RFQ/Block WS
      rfqs:
        channel: rfqs
      quotes:
        channel: quotes
      struc_block_trades:
        channel: struc-block-trades
      public_struc_block_trades:
        channel: public-struc-block-trades
      public_block_trades:
        channel: public-block-trades
      block_tickers:
        channel: block-tickers

  # ─── OkxExchangeDataFutures (交割合约) ──────────────────────
  futures:
    exchange_name: OkxFutures
    symbol_format: "{base}-{quote}"
    rest_paths:
      <<: *shared_rest_paths
    wss_paths:
      tick:
        channel: tickers
        instType: FUTURES
        instId: "<symbol>"
      depth:
        channel: books5
        instType: FUTURES
        instId: "<symbol>"
      books:
        channel: books
        instType: FUTURES
        instId: "<symbol>"
      bidAsk:
        channel: bbo-tbt
        instType: FUTURES
        instId: "<symbol>"
      orders:
        channel: orders
        instType: FUTURES
        instId: "<symbol>"
      account:
        channel: account
        instType: FUTURES
        instId: "<symbol>"
      positions:
        channel: positions
        instType: FUTURES
        instId: "<symbol>"

  # ─── OkxExchangeDataSpot (现货) ─────────────────────────────
  spot:
    exchange_name: OkxSpot
    symbol_format: "{base}-{quote}"
    rest_paths:
      <<: *shared_rest_paths
      # Spot overrides
      get_instruments: "GET /api/v5/public/instruments"
      get_kline: "GET /api/v5/market/history-candles"
      set_leverage: "POST /api/v5/account/set-leverage"
    wss_paths:
      tick:
        channel: tickers
        instId: "<symbol>"
      depth:
        channel: books5
        instId: "<symbol>"
      books:
        channel: books
        instId: "<symbol>"
      bidAsk:
        channel: bbo-tbt
        instId: "<symbol>"
      increDepthFlow:
        channel: books50-l2-tbt
        instId: "<symbol>"
      books_l2_tbt:
        channel: books-l2-tbt
        instId: "<symbol>"
      mark_price:
        channel: mark-price
        instId: "<symbol>"
      orders:
        channel: orders
        instType: MARGIN
        instId: "<symbol>"
      balance:
        channel: account
        ccy: "<currency>"
      account:
        channel: account
        instType: SPOT
        instId: "<symbol>"
      positions:
        channel: positions
        instType: SPOT
        instId: "<symbol>"
      position:
        channel: positions
        instType: SPOT
        instId: "<symbol>"
      balance_position:
        channel: balance_and_position
      kline:
        channel: "candle<period>"
        instId: "<symbol>"
      algo_orders:
        channel: orders-algo
        instType: SPOT
        instId: "<symbol>"
