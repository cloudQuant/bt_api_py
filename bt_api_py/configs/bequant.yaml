# BeQuant Exchange Configuration
# BeQuant uses HitBTC V3 API (white-label) with HTTP Basic Auth
id: bequant
display_name: BeQuant
venue_type: cex
website: https://bequant.io
api_doc: https://api.bequant.io/

authentication:
  type: basic_auth

kline_periods:
  1m: "M1"
  3m: "M3"
  5m: "M5"
  15m: "M15"
  30m: "M30"
  1h: "H1"
  4h: "H4"
  1d: "D1"
  1w: "D7"
  1M: "1M"

legal_currency: [USDT, USD, BTC, ETH, EUR]

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 1
    limit: 30
    scope: global
  - name: trading_api
    type: sliding_window
    interval: 1
    limit: 300
    scope: global

asset_types:
  spot:
    exchange_name: BEQUANT___SPOT
    rest_url: "https://api.bequant.io/api/3"
    wss_url: "wss://api.bequant.io/api/3/ws/public"
    symbol_format: "{base}{quote}"
    legal_currency: [USDT, USD, BTC, ETH, EUR]
    rest_paths:
      # Public endpoints (same as HitBTC v3)
      get_server_time: "GET /public/time"
      get_exchange_info: "GET /public/symbol"
      get_tick: "GET /public/ticker/{symbol}"
      get_tick_all: "GET /public/ticker"
      get_depth: "GET /public/orderbook/{symbol}"
      get_trades: "GET /public/trades/{symbol}"
      get_kline: "GET /public/candles/{symbol}"
      # Trading endpoints
      make_order: "POST /spot/order"
      cancel_order: "DELETE /spot/order/{client_order_id}"
      cancel_all_orders: "DELETE /spot/order"
      get_open_orders: "GET /spot/order"
      query_order: "GET /spot/order/{client_order_id}"
      # Account endpoints
      get_balance: "GET /spot/balance"
      get_account: "GET /spot/balance"
    wss_paths:
      ticker: "ticker/1s"
      orderbook: "orderbook/full"
      trades: "trades"
      candles: "candles"
