id: btc_markets
display_name: BTC Markets
venue_type: cex
website: https://btcmarkets.net
api_doc: https://docs.btcmarkets.net/v3/
connection:
  type: http
  timeout: 10
  max_retries: 3
base_urls:
  rest:
    default: https://api.btcmarkets.net
    spot: https://api.btcmarkets.net
  wss:
    default: wss://socket.btcmarkets.net/v3
    spot: wss://socket.btcmarkets.net/v3
authentication:
  type: hmac_sha512
  header_name: BM-AUTH-APIKEY
  timestamp_key: BM-AUTH-TIMESTAMP
  signature_key: BM-AUTH-SIGNATURE
kline_periods:
  1m: 1m
  1h: 1h
  1d: 1d
legal_currency: &id001
- AUD
rate_limits:
- name: public_api
  type: sliding_window
  interval: 1
  limit: 1
  scope: global
- name: private_api
  type: sliding_window
  interval: 1
  limit: 1
  scope: global
asset_types:
  spot:
    exchange_name: btc_markets
    symbol_format: '{base}-{quote}'
    rest_paths:
      get_server_time: GET /v3/time
      get_ticker: GET /v3/markets/{marketId}/ticker
      get_depth: GET /v3/markets/{marketId}/orderbook
      get_kline: GET /v3/markets/{marketId}/candles
      get_markets: GET /v3/markets
    wss_paths:
      ticker: ticker
      depth: orderbook
      trade: trades
    legal_currency: *id001
