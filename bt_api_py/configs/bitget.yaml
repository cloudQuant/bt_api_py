      get_order_list: "GET /api/v2/spot/trade/history-orders"
      get_all_order_lists: "GET /api/v2/spot/trade/history-orders"
      get_open_order_lists: "GET /api/v2/spot/trade/unfilled-orders"
      cancel_order_list: "POST /api/v2/spot/trade/cancel-order"
      # Listen Key
      get_listen_key: "POST /api/v2/spot/account/listen-key"
      refresh_listen_key: "PUT /api/v2/spot/account/listen-key"
      close_listen_key: "DELETE /api/v2/spot/account/listen-key"
