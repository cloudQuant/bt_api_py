# CoinSpot Exchange Configuration
# API: Public V2 (GET) / Private V2 (POST)  (https://www.coinspot.com.au/api)
# Auth: HMAC-SHA512 over JSON body with nonce; headers: key + sign
# Response: {"status": "ok", ...} / {"status": "error", "message": "..."}
# Symbol: coin shortname "BTC" (no trading pair)
# No WebSocket support
id: coinspot
display_name: CoinSpot
venue_type: cex
website: https://www.coinspot.com.au
api_doc: https://www.coinspot.com.au/api

connection:
  type: http
  timeout: 10
  max_retries: 3

authentication:
  type: hmac_sha512
  header_name: key
  signature_key: sign

kline_periods:
  1m: "1"
  5m: "5"
  15m: "15"
  30m: "30"
  1h: "60"
  4h: "240"
  1d: "D"

legal_currency: &lc
  - AUD
  - USDT
  - USD
  - BTC
  - ETH

rate_limits:
  - name: public_api
    type: sliding_window
    interval: 1
    limit: 1
    scope: global
  - name: private_api
    type: sliding_window
    interval: 1
    limit: 1
    scope: global

asset_types:
  spot:
    exchange_name: COINSPOT___SPOT
    rest_url: "https://www.coinspot.com.au"
    wss_url: ""
    symbol_format: "{base}"
    legal_currency: *lc
    rest_paths:
      # Market data (public GET, V2)
      get_exchange_info: "GET /pubapi/v2/latest"
      get_tick: "GET /pubapi/v2/latest"
      get_buy_price: "GET /pubapi/v2/buyprice"
      get_sell_price: "GET /pubapi/v2/sellprice"
      get_depth: "GET /pubapi/v2/orders/open"
      get_deals: "GET /pubapi/v2/orders/completed"
      # Account (private POST, V2)
      get_balance: "POST /api/v2/my/balances"
      get_account: "POST /api/v2/my/balances"
      # Trading (private POST, V2)
      make_order_buy: "POST /api/v2/my/buy"
      make_order_sell: "POST /api/v2/my/sell"
      cancel_order_buy: "POST /api/v2/my/buy/cancel"
      cancel_order_sell: "POST /api/v2/my/sell/cancel"
    kline_periods:
      1m: "1"
      5m: "5"
      15m: "15"
      30m: "30"
      1h: "60"
      4h: "240"
      1d: "D"
