      tick_all: "!bookTicker"
      ticks: "!ticker@arr"
      tickers: "!ticker@arr"
      market: "!bookTicker"
      bidAsk: "<symbol>@bookTicker"
      clearPrice: "<symbol>@markPrice@1s"
      liquidation: "<symbol>@forceOrder"
      liquidation_order: "<symbol>@forceOrder"
      contract_info: "!contractInfo"
      # User Data Streams (listen key based)
      listen_key: ""
      orders: ""
      deals: ""
      balance: ""
      position: ""
      account: ""
      portfolio: ""

